datastore:
  client_faraday_adapter:
    name: httpx
    require: httpx/adapters/faraday
  clusters:
    main:
      url: http://localhost:9444
      backend: elasticsearch
      settings: {}
  index_definitions:
    widgets:
      query_cluster: "main"
      index_into_clusters: ["main"]
      ignore_routing_values: []
      custom_timestamp_ranges: []
      setting_overrides:
        number_of_shards: 1
      setting_overrides_by_timestamp: {}
  max_client_retries: 3
graphql:
  default_page_size: 50
  max_page_size: 500
logger:
  device: stderr
indexer:
  latency_slo_thresholds_by_timestamp_in_ms: {}
schema_artifacts:
  directory: config/site/examples/schema_customization_rake_tasks/schema_artifacts
