    window.store["/query-api/aggregations/grouping/"] = {
        "title": "ElasticGraph Query API: Aggregation Grouping",
        "content": "ElasticGraph Query API: Aggregation Grouping When aggregating documents, the groupings are defined by groupedBy. Here’s an example: query ArtistCountsByYearFormedAndHomeCountry { artistAggregations { nodes { groupedBy { bio { yearFormed homeCountry } } count } } } In this case, we’re grouping by multiple fields; a grouping will be returned for each combination of Artist.bio.yearFormed and Artist.bio.homeCountry found in the data. Date Grouping In the example above, the grouping was performed on the raw values of the groupedBy fields. However, for Date fields it’s generally more useful to group by truncated values. Here’s an example: query AlbumSalesByReleaseYear { artistAggregations { nodes { subAggregations { albums { nodes { groupedBy { releasedOn { asDate(truncationUnit: YEAR) } } aggregatedValues { soldUnits { exactSum } } } } } } } } In this case, we’re truncating the Album.releaseOn dates to the year to give us one grouping per year rather than one grouping per distinct date. The truncationUnit argument supports DAY, MONTH, QUARTER, WEEK and YEAR values. In addition, an offset argument is supported, which can be used to shift what grouping a Date falls into. This is particularly useful when using WEEK: query AlbumSalesByReleaseWeek { artistAggregations { nodes { subAggregations { albums { nodes { groupedBy { releasedOn { asDate(truncationUnit: WEEK, offset: {amount: -1, unit: DAY}) } } aggregatedValues { soldUnits { exactSum } } } } } } } } With no offset, grouped weeks run Monday to Sunday, but we can shift it using offset. In this case, the weeks have been shifted to run Sunday to Saturday. Finally, we can also group Date fields by what day of week they fall into using asDayOfWeek instead of asDate: query AlbumSalesByReleaseDayOfWeek { artistAggregations { nodes { subAggregations { albums { nodes { groupedBy { releasedOn { asDayOfWeek } } aggregatedValues { soldUnits { exactSum } } } } } } } } DateTime Grouping DateTime fields offer a similar grouping API. asDate and asDayOfWeek work the same, but they accept an optional timeZone argument (default is “UTC”): query TourAttendanceByYear { artistAggregations { nodes { subAggregations { tours { nodes { subAggregations { shows { nodes { groupedBy { startedAt { asDate( truncationUnit: YEAR timeZone: \"America/Los_Angeles\" ) } } aggregatedValues { attendance { exactSum } } } } } } } } } } } Sub-day granualarities (HOUR, MINUTE, SECOND) are supported when you use asDateTime instead of asDate: query TourAttendanceByHour { artistAggregations { nodes { subAggregations { tours { nodes { subAggregations { shows { nodes { groupedBy { startedAt { asDateTime(truncationUnit: HOUR) } } aggregatedValues { attendance { exactSum } } } } } } } } } } } Finally, you can group by the time of day (while ignoring the date) by using asTimeOfDay: query TourAttendanceByHourOfDay { artistAggregations { nodes { subAggregations { tours { nodes { subAggregations { shows { nodes { groupedBy { startedAt { asTimeOfDay(truncationUnit: HOUR) } } aggregatedValues { attendance { exactSum } } } } } } } } } } }",
        "url": "/elasticgraph/query-api/aggregations/grouping/"
    };

    window.store["/query-api/aggregations/"] = {
        "title": "ElasticGraph Query API: Aggregations",
        "content": "ElasticGraph Query API: Aggregations ElasticGraph offers a powerful aggregations API. Each indexed type gets a corresponding *Aggregations field. Here’s a complete example: query BluegrassArtistAggregations($cursor: Cursor) { artistAggregations( first: 10 after: $cursor filter: {bio: {description: {matchesQuery: {query: \"bluegrass\"}}}} ) { pageInfo { hasNextPage endCursor } nodes { groupedBy { bio { yearFormed } } aggregatedValues { lifetimeSales { approximateAvg exactMin exactMax } } count subAggregations { albums( first: 3 filter: {tracks: {count: {gt: 10}}} ) { nodes { countDetail { approximateValue } } } } } } } Aggregation fields support filtering and pagination but do not support client-specified sorting1. Under an aggregations field, each node represents a grouping of documents. When groupedBy fields have been requested, each node represents the grouping of documents that have the groupedBy values. When no groupedBy fields have been requested, a single node will be returned containing a grouping for all documents matched by the filter. Aggregation nodes in turn offer 4 different aggregation features. Subpages Aggregated Values Counts Grouping Sub-Aggregations Aggregation sorting is implicitly controlled by the groupings–the nodes will sort ascending by each of the grouping fields. ↩",
        "url": "/elasticgraph/query-api/aggregations/"
    };

    window.store["/query-api/aggregations/sub-aggregations/"] = {
        "title": "ElasticGraph Query API: Sub-Aggregations",
        "content": "ElasticGraph Query API: Sub-Aggregations The example schema used throughout this guide has a number of lists-of-object fields nested within the overall Artist type: Artist.albums Artist.albums[].tracks Artist.tours Artist.tours[].shows ElasticGraph supports aggregations on these nested fields via subAggregations. This can be used to aggregate directly on the data of one of these fields. For example, this query returns the total sales for all albums of all artists: query TotalAlbumSales { artistAggregations { nodes { subAggregations { albums { nodes { aggregatedValues { soldUnits { exactSum } } } } } } } } Sub-aggregations can also be performed under the groupings of an outer aggregation. For example, this query returns the total album sales grouped by the home country of the artist: query TotalAlbumSalesByArtistHomeCountry { artistAggregations { nodes { groupedBy { bio { homeCountry } } subAggregations { albums { nodes { aggregatedValues { soldUnits { exactSum } } } } } } } } Sub-aggregation nodes offer the standard set of aggregation operations: Aggregated Values Counts Grouping Sub-aggregations Filtering Sub-Aggregations The data included in a sub-aggregation can be filtered. For example, this query gets the total sales of all albums released in the 21st century: query TwentyFirstCenturyAlbumSales { artistAggregations { nodes { subAggregations { albums(filter: { releasedOn: {gte: \"2000-01-01\"} }) { nodes { aggregatedValues { soldUnits { exactSum } } } } } } } } Sub-Aggregation Limitations Sub-aggregation pagination support is limited. You can use first to request how many nodes are returned, but there is no pageInfo and you cannot request the next page of data: query AlbumSalesByReleaseMonth { artistAggregations { nodes { subAggregations { albums(first: 100) { nodes { groupedBy { releasedOn { asDate(truncationUnit: MONTH) } } aggregatedValues { soldUnits { exactSum } } } } } } } } Sub-aggregation counts are approximate. Instead of count, ElasticGraph offers countDetail with multiple subfields: query AlbumCount { artistAggregations { nodes { subAggregations { albums { nodes { countDetail { approximateValue exactValue upperBound } } } } } } } approximateValue The (approximate) count of documents in this aggregation bucket. When documents in an aggregation bucket are sourced from multiple shards, the count may be only approximate. The upperBound indicates the maximum value of the true count, but usually the true count is much closer to this approximate value (which also provides a lower bound on the true count). When this approximation is known to be exact, the same value will be available from exactValue and upperBound. exactValue The exact count of documents in this aggregation bucket, if an exact value can be determined. When documents in an aggregation bucket are sourced from multiple shards, it may not be possible to efficiently determine an exact value. When no exact value can be determined, this field will be null. The approximateValue field–which will never be null–can be used to get an approximation for the count. upperBound An upper bound on how large the true count of documents in this aggregation bucket could be. When documents in an aggregation bucket are sourced from multiple shards, it may not be possible to efficiently determine an exact value. The approximateValue field provides an approximation, and this field puts an upper bound on the true count.",
        "url": "/elasticgraph/query-api/aggregations/sub-aggregations/"
    };

    window.store["/query-api/filtering/available-predicates/"] = {
        "title": "ElasticGraph Query API: Available Filter Predicates",
        "content": "ElasticGraph Query API: Available Filter Predicates ElasticGraph offers a variety of filtering predicates: allOf Matches records where all of the provided sub-filters evaluate to true. This works just like an AND operator in SQL. Note: multiple filters are automatically ANDed together. This is only needed when you have multiple filters that can’t be provided on a single filter input because of collisions between key names. For example, if you want to provide multiple anySatisfy: ... filters, you could do allOf: [{anySatisfy: ...}, {anySatisfy: ...}]. When null or an empty list is passed, matches all documents. anyOf Matches records where any of the provided sub-filters evaluate to true. This works just like an OR operator in SQL. When null is passed, matches all documents. When an empty list is passed, this part of the filter matches no documents. anySatisfy Matches records where any of the list elements match the provided sub-filter. When null or an empty object is passed, matches all documents. count Used to filter on the number of non-null elements in this list field. When null or an empty object is passed, matches all documents. equalToAnyOf Matches records where the field value is equal to any of the provided values. This works just like an IN operator in SQL. When null is passed, matches all documents. When an empty list is passed, this part of the filter matches no documents. When null is passed in the list, this part of the filter matches records where the field value is null. gt Matches records where the field value is greater than (>) the provided value. When null is passed, matches all documents. gte Matches records where the field value is greater than or equal to (>=) the provided value. When null is passed, matches all documents. lt Matches records where the field value is less than (<) the provided value. When null is passed, matches all documents. lte Matches records where the field value is less than or equal to (<=) the provided value. When null is passed, matches all documents. matchesPhrase Matches records where the field value has a phrase matching the provided phrase using full text search. This is stricter than matchesQuery: all terms must match and be in the same order as the provided phrase. When null is passed, matches all documents. matchesQuery Matches records where the field value matches the provided query using full text search. This is more lenient than matchesPhrase: the order of terms is ignored, and, by default, only one search term is required to be in the field value. When null is passed, matches all documents. near Matches records where the field’s geographic location is within a specified distance from the location identified by latitude and longitude. When null or an empty object is passed, matches all documents. not Matches records where the provided sub-filter evaluates to false. This works just like a NOT operator in SQL. When null or an empty object is passed, matches no documents. timeOfDay Matches records based on the time-of-day of the DateTime values. When null or an empty object is passed, matches no documents.",
        "url": "/elasticgraph/query-api/filtering/available-predicates/"
    };

    window.store["/query-api/filtering/conjunctions/"] = {
        "title": "ElasticGraph Query API: Filter Conjunctions",
        "content": "ElasticGraph Query API: Filter Conjunctions ElasticGraph supports two conjunction predicates: allOf Matches records where all of the provided sub-filters evaluate to true. This works just like an AND operator in SQL. Note: multiple filters are automatically ANDed together. This is only needed when you have multiple filters that can’t be provided on a single filter input because of collisions between key names. For example, if you want to provide multiple anySatisfy: ... filters, you could do allOf: [{anySatisfy: ...}, {anySatisfy: ...}]. When null or an empty list is passed, matches all documents. anyOf Matches records where any of the provided sub-filters evaluate to true. This works just like an OR operator in SQL. When null is passed, matches all documents. When an empty list is passed, this part of the filter matches no documents. By default, multiple filters are ANDed together. For example, this query finds artists formed after the year 2000 with “accordion” in their bio: query FindRecentAccordionArtists { artists(filter: { bio: { yearFormed: {gt: 2000} description: {matchesQuery: {query: \"accordion\"}} } }) { nodes { name bio { yearFormed description } } } } ORing subfilters with anyOf To instead find artists formed after the year 2000 OR with “accordion” in their bio, you can wrap the sub-filters in an anyOf: query FindRecentOrAccordionArtists { artists(filter: { bio: { anyOf: [ {yearFormed: {gt: 2000}} {description: {matchesQuery: {query: \"accordion\"}}} ] } }) { nodes { name bio { yearFormed description } } } } anyOf is available at all levels of the filtering structure so that you can OR sub-filters anywhere you like. ANDing subfilters with allOf allOf is rarely needed since multiple filters are ANDed together by default. But it can come in handy when you’d otherwise have a duplicate key collision on a filter input. One case where this comes in handy is when using anySatisfy to filter on a list. Consider this query: query ArtistsWithPlatinum90sAlbum { artists(filter: { albums: { anySatisfy: { soldUnits: {gte: 1000000} releasedOn: {gte: \"1990-01-01\", lt: \"2000-01-01\"} } } }) { nodes { name albums { name releasedOn soldUnits } } } } This query finds artists who released an album in the 90’s that sold more than million copies. If you wanted to broaden the query to find artists with at least one 90’s album and at least one platinum-selling album–without requiring it to be the same album–you could do this: query ArtistsWith90sAlbumAndPlatinumAlbum { artists(filter: { albums: { allOf: [ {anySatisfy: {soldUnits: {gte: 1000000}}} {anySatisfy: {releasedOn: {gte: \"1990-01-01\", lt: \"2000-01-01\"}}} ] } }) { nodes { name albums { name releasedOn soldUnits } } } } GraphQL input objects don’t allow duplicate keys, so albums: {anySatisfy: {...}, anySatisfy: {...}} isn’t supported, but allOf enables this use case. Warning: Always Pass a List When using allOf or anyOf, be sure to pass the sub-filters as a list. If you instead pass them as an object, it won’t work as expected. Consider this query: query AnyOfGotcha { artists(filter: { bio: { anyOf: { yearFormed: {gt: 2000} description: {matchesQuery: {query: \"accordion\"}} } } }) { nodes { name bio { yearFormed description } } } } While this query will return results, it doesn’t behave as it appears. The GraphQL spec mandates that list inputs coerce non-list values into a list of one value. In this case, that means that the anyOf expression is coerced into this: query AnyOfGotcha { artists(filter: { bio: { anyOf: [{ yearFormed: {gt: 2000} description: {matchesQuery: {query: \"accordion\"}} }] } }) { # ... } } Using anyOf with only a single sub-expression, as we have here, doesn’t do anything; the query is equivalent to: query AnyOfGotcha { artists(filter: { bio: { yearFormed: {gt: 2000} description: {matchesQuery: {query: \"accordion\"}} } }) { # ... } }",
        "url": "/elasticgraph/query-api/filtering/conjunctions/"
    };

    window.store["/query-api/filtering/date-time/"] = {
        "title": "ElasticGraph Query API: DateTime Filtering",
        "content": "ElasticGraph Query API: DateTime Filtering ElasticGraph supports three different date/time types: Date A date, represented as an ISO 8601 date string. Example: \"2024-10-15\". DateTime A timestamp, represented as an ISO 8601 time string. Example: \"2024-10-15T07:23:15Z\". LocalTime A local time such as \"23:59:33\" or \"07:20:47.454\" without a time zone or offset, formatted based on the partial-time portion of RFC3339. All three support the standard set of equality and comparison predicates. In addition, DateTime fields support one more filtering operator: timeOfDay Matches records based on the time-of-day of the DateTime values. When null or an empty object is passed, matches no documents. For example, you could use it to find shows that started between noon and 3 pm on any date: query FindEarlyAfternoonShows { artists(filter: { tours: {anySatisfy: {shows: {anySatisfy: { startedAt: { timeOfDay: { timeZone: \"America/Los_Angeles\" gte: \"12:00:00\" lt: \"15:00:00\" } } }}}} }) { nodes { name tours { shows { venue { id } startedAt } } } } }",
        "url": "/elasticgraph/query-api/filtering/date-time/"
    };

    window.store["/query-api/filtering/equality/"] = {
        "title": "ElasticGraph Query API: Equality Filtering",
        "content": "ElasticGraph Query API: Equality Filtering The most commonly used predicate supports equality filtering: equalToAnyOf Matches records where the field value is equal to any of the provided values. This works just like an IN operator in SQL. When null is passed, matches all documents. When an empty list is passed, this part of the filter matches no documents. When null is passed in the list, this part of the filter matches records where the field value is null. Here’s a basic example: query EqualityFilter { artists(filter: { name: {equalToAnyOf: [\"U2\", \"Radiohead\"]} }) { nodes { name bio { yearFormed } } } } Unlike the SQL IN operator, you can find records with null values if you put null in the list: query EqualityFilterNull { artists(filter: { name: {equalToAnyOf: [null]} }) { nodes { name bio { yearFormed } } } }",
        "url": "/elasticgraph/query-api/filtering/equality/"
    };

    window.store["/query-api/filtering/full-text-search/"] = {
        "title": "ElasticGraph Query API: Full Text Search",
        "content": "ElasticGraph Query API: Full Text Search ElasticGraph supports two full-text search filtering predicates: matchesPhrase Matches records where the field value has a phrase matching the provided phrase using full text search. This is stricter than matchesQuery: all terms must match and be in the same order as the provided phrase. When null is passed, matches all documents. matchesQuery Matches records where the field value matches the provided query using full text search. This is more lenient than matchesPhrase: the order of terms is ignored, and, by default, only one search term is required to be in the field value. When null is passed, matches all documents. Matches Query matchesQuery is the more lenient of the two predicates. It’s designed to match broadly. Here’s an example: query AccordionOrViolinSearch { artists(filter: { bio: { description: { matchesQuery: { query: \"accordion violin\" } } } }) { nodes { name bio { description } } } } This query will match artists with bios like: Renowned for his mesmerizing performances, Luca “The Breeze” Fontana captivates audiences with his accordion, weaving intricate melodies that dance between the notes of traditional folk and modern jazz. Sylvia Varela’s avant-garde violin playing defies tradition, blending haunting dissonance with unexpected rhythms. Notably, the description needs accordion OR violin, but not both. In addition, it would match an artist bio that mentioned “viola” since it supports fuzzy matching by default and “viola” is only 2 edits away from “violin”. Arguments are supported to control both aspects to make matching stricter: query AccordionAndViolinStrictSearch { artists(filter: { bio: { description:{ matchesQuery: { query: \"accordion violin\" requireAllTerms: true allowedEditsPerTerm: NONE } } } }) { nodes { name bio { description } } } } Matches Phrase matchesPhrase is even stricter: it requires all terms in the provided order (matchesQuery doesn’t care about order). It’s particularly useful when you want to search on a particular multi-word expression: query PhraseSearch { artists(filter: { bio: { description:{ matchesPhrase: { phrase: \"Ed Sullivan Show\" } } } }) { nodes { name bio { description } } } } Bypassing matchesPhrase and matchesQuery In order to make a matchesPhrase or matchesQuery filter optional, you can supply null to the MatchesQueryFilterInput parameter, like this: query OptionalMatchingFilter( $optionalMatchQuery: MatchesQueryFilterInput = null ) { artists(filter: { bio: { description: { matchesQuery: $optionalMatchQuery } } }) { nodes { name bio { description } } } }",
        "url": "/elasticgraph/query-api/filtering/full-text-search/"
    };

    window.store["/query-api/filtering/"] = {
        "title": "ElasticGraph Query API: Filtering",
        "content": "ElasticGraph Query API: Filtering Use filter: on a root query field to narrow down the returned results: query FindArtist { byName: artists(filter: { name: {equalToAnyOf: [\"U2\"]} }) { nodes { name bio { yearFormed } } } byBioYearFounded: artists(filter: { bio: {yearFormed: {gt: 2000}} }) { nodes { name bio { yearFormed } } } } As shown here, filters have two basic parts: A field path: this specifies which field you want to filter on. When dealing with a nested field (e.g. bio.yearFormed), you’ll need to provide a nested object matching the field structure. A filtering predicate: this specifies a filtering operator to apply at the field path. Empty Filters Filters with a value of null or empty object ({}) match all documents. When negated with not, no documents are matched. The filters in this query match all documents: query EmptyFilters { artists(filter: { name: {equalToAnyOf: null} bio: {yearFormed: {}} }) { nodes { name bio { yearFormed } } } } This particularly comes in handy when using query variables. It allows a query to flexibly support a wide array of filters without requiring them to all be used for an individual request. query FindArtists( $names: [String!] = null $yearFormed_gt: Int = null $albumNames: [String!] = null ) { artists(filter: { name: {equalToAnyOf: $names} bio: {yearFormed: {gt: $yearFormed_gt}} albums: {anySatisfy: {name: {equalToAnyOf: $albumNames}}} }) { nodes { name bio { yearFormed } albums { name } } } } Subpages Available Filter Predicates Comparison Filtering Conjunctions Date Time Filtering Equality Filtering Full Text Search Geographic Filtering List Filtering Negation",
        "url": "/elasticgraph/query-api/filtering/"
    };

    window.store["/query-api/filtering/list/"] = {
        "title": "ElasticGraph Query API: List Filtering",
        "content": "ElasticGraph Query API: List Filtering ElasticGraph supports a couple predicates for filtering on list fields: anySatisfy Matches records where any of the list elements match the provided sub-filter. When null or an empty object is passed, matches all documents. count Used to filter on the number of non-null elements in this list field. When null or an empty object is passed, matches all documents. Filtering on list elements with anySatisfy When filtering on a list field, use anySatisfy to find records with matching list elements. This query, for example, will find artists that released a platinum-selling album in the 1990s: query ArtistsWithPlatinum90sAlbum { artists(filter: { albums: { anySatisfy: { soldUnits: {gte: 1000000} releasedOn: {gte: \"1990-01-01\", lt: \"2000-01-01\"} } } }) { nodes { name albums { name releasedOn soldUnits } } } } Warning One thing to bear in mind: this query is selecting which artists to return, not which albums to return. You might expect that the returned nodes.albums would all be platinum-selling 90s albums, but that’s not how the filtering API works. Only artists that had a platinum-selling 90s album will be returned, and for each returned artists, all their albums will be returned–even ones that sold poorly or were released outside the 1990s. Filtering on the list size with count If you’d rather filter on the size of a list, use count: query FindProlificArtists { artists(filter: { albums: {count: {gte: 20}} }) { nodes { name albums { name } } } }",

(function() {
    function highlightText(text, term) {
        const regex = new RegExp(`(${term})`, 'gi');
        return text.replace(regex, '<mark>$1</mark>');
    }

    function displaySearchResults(results, store) {
        const searchResults = document.getElementById('search-results');
        if (results.length) {
            let appendString = '';

            for (let i = 0; i < Math.min(results.length, 20); i++) {
                let item = store[results[i].ref];
                let preview = item.content;
                const searchTerm = document.getElementById('search-input').value.toLowerCase();

                // Find all matches in the content
                const matches = [...preview.toLowerCase().matchAll(searchTerm)];
                if (matches.length > 0) {
                    // Take a larger snippet around the first match
                    const matchIndex = matches[0].index;
                    const startIndex = Math.max(0, matchIndex - 200);
                    const endIndex = Math.min(preview.length, matchIndex + 400);

                    // Add ellipsis if we're not at the start/end
                    preview = (startIndex > 0 ? '... ' : '') +
                            preview.substring(startIndex, endIndex) +
                            (endIndex < preview.length ? ' ...' : '');
                } else {
                    // No direct match found (might be matching title), show first 600 chars
                    preview = preview.substring(0, 600) + ' ...';
                }

                // Highlight all search terms in the preview
                const terms = searchTerm.split(/\s+/);
                terms.forEach(term => {
                    if (term) {
                        preview = highlightText(preview, term);
                    }
                });

                appendString += '<li class="result-item">';
                appendString += '<a href="' + item.url + '" class="no-underline hover:underline"><h3>' + highlightText(item.title, searchTerm) + '</h3></a>';
                appendString += '<p class="preview">' + preview + '</p>';
                appendString += '<p class="url">' + item.url + '</p>';
                appendString += '</li>';
            }

            if (results.length > 20) {
                appendString += '<li class="more-results">Showing top 20 results of ' + results.length + ' total matches</li>';
            }

            searchResults.innerHTML = appendString;
        } else {
            searchResults.innerHTML = '<li class="no-results">No results found</li>';
        }
    }

    function getQueryVariable(variable) {
        var query = window.location.search.substring(1);
        var vars = query.split('&');

        for (var i = 0; i < vars.length; i++) {
            var pair = vars[i].split('=');

            if (pair[0] === variable) {
                return decodeURIComponent(pair[1].replace(/\+/g, '%20'));
            }
        }
    }

    let searchTerm = getQueryVariable('query');

    if (searchTerm) {
        document.getElementById('search-input').setAttribute("value", searchTerm);

        // Initialize lunr with the fields we want to search
        var idx = lunr(function () {
            this.field('id');
            this.field('title', { boost: 10 });
            this.field('content');

            for (var key in window.store) {
                this.add({
                    'id': key,
                    'title': window.store[key].title,
                    'content': window.store[key].content
                });
            }
        });

        var results = idx.search(searchTerm);
        displaySearchResults(results, window.store);
    }

    // Handle real-time search
    document.getElementById('search-input').addEventListener('keyup', function() {
        var searchTerm = this.value;

        if (searchTerm) {
            var idx = lunr(function () {
                this.field('id');
                this.field('title', { boost: 10 });
                this.field('content');

                for (var key in window.store) {
                    this.add({
                        'id': key,
                        'title': window.store[key].title,
                        'content': window.store[key].content
                    });
                }
            });

            var results = idx.search(searchTerm);
            displaySearchResults(results, window.store);
        } else {
            document.getElementById('search-results').innerHTML = '';
        }
    });
})();
</script>
