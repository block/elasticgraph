    window.store["/docs/v0.19.1.1/ElasticGraph/SchemaDefinition/SchemaElements/BuiltInTypes.html"] = {
        "title": "API Documentation - Class: ElasticGraph::SchemaDefinition::SchemaElements::BuiltInTypes",
        "content": "Index (B) » ElasticGraph » SchemaDefinition » SchemaElements » BuiltInTypes Class: ElasticGraph::SchemaDefinition::SchemaElements::BuiltInTypes Inherits: Object Object ElasticGraph::SchemaDefinition::SchemaElements::BuiltInTypes show all elasticgraph-schema_definition/lib/elastic_graph/schema_definition/schema_elements/built_in_types.rb Defines all built-in GraphQL types provided by ElasticGraph. Scalar Types Standard GraphQL Scalars These are defined by the GraphQL spec. Boolean Represents true or false values. Float Represents signed double-precision fractional values as specified by IEEE 754. ID Represents a unique identifier that is Base64 obfuscated. It is often used to refetch an object or as key for a cache. The ID type appears in a JSON response as a String; however, it is not intended to be human-readable. When expected as an input type, any string (such as \"VXNlci0xMA==\") or integer (such as 4) input value will be accepted as an ID. Int Represents non-fractional signed whole numeric values. Int can represent values between -(2^31) and 2^31 - 1. String Represents textual data as UTF-8 character sequences. This type is most often used by GraphQL to represent free-form human-readable text. Additional ElasticGraph Scalars ElasticGraph defines these additional scalar types. Cursor An opaque string value representing a specific location in a paginated connection type. Returned cursors can be passed back in the next query via the before or after arguments to continue paginating from that point. Date A date, represented as an ISO 8601 date string. DateTime A timestamp, represented as an ISO 8601 time string. JsonSafeLong A numeric type for large integer values that can serialize safely as JSON. While JSON itself has no hard limit on the size of integers, the RFC-7159 spec mentions that values outside of the range -9,007,199,254,740,991 (-(2^53) + 1) to 9,007,199,254,740,991 (2^53 - 1) may not be interopable with all JSON implementations. As it turns out, the number implementation used by JavaScript has this issue. When you parse a JSON string that contains a numeric value like 4693522397653681111, the parsed result will contain a rounded value like 4693522397653681000. While this is entirely a client-side problem, we want to preserve maximum compatibility with common client languages. Given the ubiquity of GraphiQL as a GraphQL client, we want to avoid this problem. Our solution is to support two separate types: This type (JsonSafeLong) is serialized as a number, but limits values to the safely serializable range. The LongString type supports long values that use all 64 bits, but serializes as a string rather than a number, avoiding the JavaScript compatibility problems. For more background, see the JavaScript Number.MAX_SAFE_INTEGER docs. LocalTime A local time such as \"23:59:33\" or \"07:20:47.454\" without a time zone or offset, formatted based on the partial-time portion of RFC3339. LongString A numeric type for large integer values in the inclusive range -2^63 (-9,223,372,036,854,775,808) to (2^63 - 1) (9,223,372,036,854,775,807). Note that LongString values are serialized as strings within JSON, to avoid interopability problems with JavaScript. If you want a large integer type that serializes within JSON as a number, use JsonSafeLong. TimeZone An IANA time zone identifier, such as America/Los_Angeles or UTC. For a full list of valid identifiers, see the wikipedia article. Untyped A custom scalar type that allows any type of data, including: strings numbers objects and arrays (nested as deeply as you like) booleans Note: fields of this type are effectively untyped. We recommend it only be used for parts of your schema that can’t be statically typed. Enum Types ElasticGraph defines these enum types. Most of these are intended for usage as an input argument, but they could be used as a return type in your schema if they meet your needs. DateGroupingGranularity Enumerates the supported granularities of a Date. DateGroupingTruncationUnit Enumerates the supported truncation units of a Date. DateTimeGroupingGranularity Enumerates the supported granularities of a DateTime. DateTimeGroupingTruncationUnit Enumerates the supported truncation units of a DateTime. DateTimeUnit Enumeration of DateTime units. DateUnit Enumeration of Date units. DayOfWeek Indicates the specific day of the week. DistanceUnit Enumerates the supported distance units. LocalTimeGroupingTruncationUnit Enumerates the supported truncation units of a LocalTime. LocalTimeUnit Enumeration of LocalTime units. MatchesQueryAllowedEditsPerTerm Enumeration of allowed values for the matchesQuery: {allowedEditsPerTerm: ...} filter option. Object Types ElasticGraph defines these object types. AggregationCountDetail Provides detail about an aggregation count. GeoLocation Geographic coordinates representing a location on the Earth’s surface. PageInfo Provides information about the specific fetched page. This implements the PageInfo specification from the Relay GraphQL Cursor Connections Specification.",
        "url": "/elasticgraph/docs/v0.19.1.1/ElasticGraph/SchemaDefinition/SchemaElements/BuiltInTypes.html"
    };

. } ⇒ void Registers a customization callback that will be applied to the corresponding enum values that will be generated for this field on the derived SortOrder enum type. #customize_sub_aggregations_field {|Field| ... } ⇒ void a corresponding field will be created on the *AggregationSubAggregations type derived from the parent object type. #filterable? ⇒ Boolean Indicates if this field is filterable. #groupable? ⇒ Boolean Indicates if this field is groupable. #json_schema(nullable: nil, **options) ⇒ void Defines the JSON schema validations for this field or type. #mapping_type ⇒ String The index mapping type in effect for this field. #on_each_generated_schema_element {|Field, EnumValue| ... } ⇒ void When you define a Field on an ObjectType or InterfaceType, ElasticGraph generates up to 6 different GraphQL schema elements for it:. #renamed_from(old_name) ⇒ void Registers an old name that this field used to have in a prior version of the schema. #sortable? ⇒ Boolean Indicates if this field is sortable. #sourced_from(relationship, field_path) ⇒ void Configures ElasticGraph to source a field’s value from a related object. #sub_aggregatable? ⇒ Boolean Indicates if this field can be used as the basis for a sub-aggregation. #type ⇒ TypeReference The type of this field. Methods included from Mixins::HasTypeInfo #json_schema_options, #mapping, #mapping_options Methods included from Mixins::HasDirectives #directive, #directives, #directives_sdl Methods included from Mixins::HasDocumentation #append_to_documentation, #derived_documentation, #documentation, #formatted_documentation Methods included from Mixins::VerifiesGraphQLName verify_name! Instance Attribute Details #graphql_only ⇒ Boolean (readonly) Returns true if this field exists only in the GraphQL schema and is not indexed. (Boolean) — true if this field exists only in the GraphQL schema and is not indexed #name ⇒ String (readonly) Returns name of the field. (String) — name of the field #name_in_index ⇒ String (readonly) Returns the name of this field in the datastore index. (String) — the name of this field in the datastore index #schema_def_state ⇒ State (readonly) Returns schema definition state. (State) — schema definition state Instance Method Details #aggregatable? ⇒ Boolean Indicates if this field is aggregatable. Aggregatable fields will be available under aggregatedValues for an aggregations query. Aggregatability is inferred based on the field type and mapping type, or you can use the aggregatable: true option to force it. (Boolean) #argument(name, value_type) {|Argument| ... } ⇒ Object Note: ElasticGraph takes care of defining arguments for all the query features it supports, so there is generally no need to use this API, and it has no way to interpret arbitrary arguments defined on a field. However, it can be useful for extensions that extend the GraphQL query engine. For example, Apollo uses this API to satisfy the Apollo federation subgraph spec. Defines an argument on the field. Examples: Define an argument on a field ElasticGraph.define_schema do |schema| schema.object_type \"Product\" do |t| t.field \"name\", \"String\" do |f| f.argument \"language\", \"String\" end end end Parameters: name (String) — name of the argument value_type (String) — type of the argument in GraphQL SDL syntax Yields: (Argument) — for further customization #customize_aggregated_values_field {|Field| ... } ⇒ void Note: For each field defined in your schema that is aggregatable, a corresponding aggregatedValues field will be created on the *AggregatedValues type derived from the parent object type. This method returns an undefined value.Registers a customization callback that will be applied to the corresponding aggregatedValues field that will be generated for this field. Examples: Mark CampaignAggregatedValues.adImpressions with @deprecated ElasticGraph.define_schema do |schema| schema.object_type \"Campaign\" do |t| t.field \"id\", \"ID\" t.field \"adImpressions\", \"Int\" do |f| f.customize_aggregated_values_field do |avf| avf.directive \"deprecated\" end end t.index \"campaigns\" end end Yields: (Field) — derived aggregated values field See Also: #customize_filter_field #customize_grouped_by_field #customize_sort_order_enum_values #customize_sub_aggregations_field #on_each_generated_schema_element #customize_filter_field {|Field| ... } ⇒ void Note: For each field defined in your schema that is filterable, a corresponding filtering field will be created on the *FilterInput type derived from the parent object type. This method returns an undefined value.Registers a customization callback that will be applied to the corresponding filtering field that will be generated for this field. Examples: Mark CampaignFilterInput.organizationId with @deprecated ElasticGraph.define_schema do |schema| schema.object_type \"Campaign\" do |t| t.field \"id\", \"ID\" t.field \"organizationId\", \"ID\" do |f| f.customize_filter_field do |ff| ff.directive \"deprecated\" end end t.index \"campaigns\" end end Yields: (Field) — derived filtering field See Also: #customize_aggregated_values_field #customize_grouped_by_field #customize_sort_order_enum_values #customize_sub_aggregations_field #on_each_generated_schema_element #customize_grouped_by_field {|Field| ... } ⇒ void Note: For each field defined in your schema that is groupable, a corresponding groupedBy field will be created on the *AggregationGroupedBy type derived from the parent object type. This method returns an undefined value.Registers a customization callback that will be applied to the corresponding groupedBy field that will be generated for this field. Examples: Mark CampaignGroupedBy.organizationId with @deprecated ElasticGraph.define_schema do |schema| schema.object_type \"Campaign\" do |t| t.field \"id\", \"ID\" t.field \"organizationId\", \"ID\" do |f| f.customize_grouped_by_field do |gbf| gbf.directive \"deprecated\" end end t.index \"campaigns\" end end Yields: (Field) — derived grouped by field See Also: #customize_aggregated_values_field #customize_filter_field #customize_sort_order_enum_values #customize_sub_aggregations_field #on_each_generated_schema_element #customize_sort_order_enum_values {|SortOrderEnumValue| ... } ⇒ void Note: for each sortable field, enum values will be generated on the derived sort order enum type allowing you to sort by the field ASC or DESC. This method returns an undefined value.Registers a customization callback that will be applied to the corresponding enum values that will be generated for this field on the derived SortOrder enum type. Examples: Mark CampaignSortOrder.organizationId_(ASC|DESC) with @deprecated ElasticGraph.define_schema do |schema| schema.object_type \"Campaign\" do |t| t.field \"id\", \"ID\" t.field \"organizationId\", \"ID\" do |f| f.customize_sort_order_enum_values do |soev| soev.directive \"deprecated\" end end t.index \"campaigns\" end end Yields: (SortOrderEnumValue) — derived sort order enum value See Also: #customize_aggregated_values_field #customize_filter_field #customize_grouped_by_field #customize_sub_aggregations_field #on_each_generated_schema_element #customize_sub_aggregations_field {|Field| ... } ⇒ void Note: For each field defined in your schema that is sub-aggregatable (e.g. list fields indexed using the nested mapping type), This method returns an undefined value.a corresponding field will be created on the *AggregationSubAggregations type derived from the parent object type. Registers a customization callback that will be applied to the corresponding subAggregations field that will be generated for this field. Examples: Mark TransactionAggregationSubAggregations.fees with @deprecated ElasticGraph.define_schema do |schema| schema.object_type \"Transaction\" do |t| t.field \"id\", \"ID\" t.field \"fees\", \"[Money!]!\" do |f| f.mapping type: \"nested\" f.customize_sub_aggregations_field do |saf| # Adds a `@deprecated` directive to the `PaymentAggregationSubAggregations.fees` # field without also adding it to the `Payment.fees` field. saf.directive \"deprecated\" end end t.index \"transactions\" end schema.object_type \"Money\" do |t| t.field \"amount\", \"Int\" t.field \"currency\", \"String\" end end Yields: (Field) — derived sub-aggregations field See Also: #customize_aggregated_values_field #customize_filter_field #customize_grouped_by_field #customize_sort_order_enum_values #on_each_generated_schema_element #filterable? ⇒ Boolean Indicates if this field is filterable. Filterable fields will be available in the GraphQL schema under the filter argument. Most fields are filterable, except when: It’s a relation. Relation fields require us to load the related data from another index and can’t be filtered on. The field is an object type that isn’t itself filterable (e.g. due to having no filterable fields or whatever). Explicitly disabled with filterable: false. (Boolean) #groupable? ⇒ Boolean Indicates if this field is groupable. Groupable fields will be available under groupedBy for an aggregations query. Groupability is inferred based on the field type and mapping type, or you can use the groupable: true option to force it. (Boolean) #json_schema(nullable: nil, **options) ⇒ void Note: We recommend using JSON schema validations in a limited fashion. Validations that are appropriate to apply when data is entering the system-of-record are often not appropriate on a secondary index like ElasticGraph. Events that violate a JSON schema validation will fail to index (typically they will be sent to the dead letter queue and page an oncall engineer). If an ElasticGraph instance is meant to contain all the data of some source system, you probably don’t want it applying stricter validations than the source system itself has. We recommend limiting your JSON schema validations to situations where violations would prevent ElasticGraph from operating correctly. This method returns an undefined value.Defines the JSON schema validations for this field or type. Validations defined here will be included in the generated json_schemas.yaml artifact, which is used by the ElasticGraph indexer to validate events before indexing their data in the datastore. In addition, the publisher may use json_schemas.yaml for code generation and to apply validation before publishing an event to ElasticGraph. Can be called multiple times; each time, the options will be merged into the existing options. This is required on a ScalarType (since we don’t know how a custom scalar type should be represented in JSON!). On a ElasticGraph::SchemaDefinition::SchemaElements::Field, this is optional, but can be used to make the JSON schema validation stricter then it would otherwise be. For example, you could use json_schema maxLength: 30 on a String field to limit the length. You can use any of the JSON schema validation keywords here. In addition, nullable: false is supported to configure the generated JSON schema to disallow null values for the field. Note that if you define a field with a non-nullable GraphQL type (e.g. Int!), the JSON schema will automatically disallow nulls. However, as explained in the TypeWithSubfields#field documentation, we generally recommend against defining non-nullable GraphQL fields. json_schema nullable: false will disallow null values from being indexed, while still keeping the field nullable in the GraphQL schema. If you think you might want to make a field non-nullable in the GraphQL schema some day, it’s a good idea to use json_schema nullable: false now to ensure every indexed record has a non-null value for the field. Examples: Define the JSON schema validations of a custom scalar type ElasticGraph.define_schema do |schema| schema.scalar_type \"URL\" do |t| t.mapping type: \"keyword\" # JSON schema has a built-in URI format validator: # https://json-schema.org/understanding-json-schema/reference/string.html#resource-identifiers t.json_schema type: \"string\", format: \"uri\" end end Define additional validations on a field ElasticGraph.define_schema do |schema| schema.object_type \"Card\" do |t| t.field \"id\", \"ID!\" t.field \"expYear\", \"Int\" do |f| # Use JSON schema to ensure the publisher is sending us 4 digit years, not 2 digit years. f.json_schema minimum: 2000, maximum: 2099 end t.field \"expMonth\", \"Int\" do |f| f.json_schema minimum: 1, maximum: 12 end t.index \"cards\" end end Parameters: options (Hash<Symbol, Object>) — JSON schema options #mapping_type ⇒ String The index mapping type in effect for this field. This could come from either the field definition or from the type definition. (String) #on_each_generated_schema_element {|Field, EnumValue| ... } ⇒ void This method returns an undefined value.When you define a ElasticGraph::SchemaDefinition::SchemaElements::Field on an ObjectType or InterfaceType, ElasticGraph generates up to 6 different GraphQL schema elements for it: A ElasticGraph::SchemaDefinition::SchemaElements::Field is generated on the parent ObjectType or InterfaceType (that is, this field itself). This is used by clients to ask for values for the field in a response. A ElasticGraph::SchemaDefinition::SchemaElements::Field may be generated on the *FilterInput InputType derived from the parent ObjectType or InterfaceType. This is used by clients to specify how the query should filter. A ElasticGraph::SchemaDefinition::SchemaElements::Field may be generated on the *AggregationGroupedBy ObjectType derived from the parent ObjectType or InterfaceType. This is used by clients to specify how aggregations should be grouped. A ElasticGraph::SchemaDefinition::SchemaElements::Field may be generated on the *AggregatedValues ObjectType derived from the parent ObjectType or InterfaceType. This is used by clients to apply aggregation functions (e.g. sum, max, min, etc) to a set of field values for a group. A ElasticGraph::SchemaDefinition::SchemaElements::Field may be generated on the *AggregationSubAggregations ObjectType derived from the parent ObjectType or InterfaceType. This is used by clients to perform sub-aggregations on list fields indexed using the nested mapping type. Multiple EnumValues (both *_ASC and *_DESC) are generated on the *SortOrder EnumType derived from the parent indexed ObjectType. This is used by clients to sort by a field. This method registers a customization callback which is applied to every element that is generated for this field. Examples: ElasticGraph.define_schema do |schema| schema.object_type \"Transaction\" do |t| t.field \"id\", \"ID\" t.field \"amount\", \"Int\" do |f| f.on_each_generated_schema_element do |element| # Adds a `@deprecated` directive to every GraphQL schema element generated for `amount`: # # - The `Transaction.amount` field. # - The `TransactionFilterInput.amount` field. # - The `TransactionAggregationGroupedBy.amount` field. # - The `TransactionAggregatedValues.amount` field. # - The `TransactionSortOrder.amount_ASC` and`TransactionSortOrder.amount_DESC` enum values. element.directive \"deprecated\" end end t.index \"transactions\" end end Yields: (Field, EnumValue) — the schema element See Also: #customize_aggregated_values_field #customize_filter_field #customize_grouped_by_field #customize_sort_order_enum_values #customize_sub_aggregations_field #renamed_from(old_name) ⇒ void Note: In situations where this API applies, ElasticGraph will give you an error message indicating that you need to use this API or TypeWithSubfields#deleted_field. Likewise, when ElasticGraph no longer needs to know about this, it’ll give you a warning indicating the call to this method can be removed. This method returns an undefined value.Registers an old name that this field used to have in a prior version of the schema. Examples: Indicate that Widget.description used to be called Widget.notes. ElasticGraph.define_schema do |schema| schema.object_type \"Widget\" do |t| t.field \"description\", \"String\" do |f| f.renamed_from \"notes\" end end end Parameters: old_name (String) — old name this field used to have in a prior version of the schema #sortable? ⇒ Boolean Indicates if this field is sortable. Sortable fields will have corresponding _ASC and _DESC values generated in the sort order EnumType of the parent indexed type. By default, the sortability is inferred by the field type and mapping. For example, list fields are not sortable, and fields mapped as text are not sortable either. Fields are sortable in most other cases. The sortable: true option can be used to force a field to be sortable. (Boolean) — true if this field is sortable #sourced_from(relationship, field_path) ⇒ void This method returns an undefined value.Configures ElasticGraph to source a field’s value from a related object. This can be used to denormalize data at ingestion time to support filtering, grouping, sorting, or aggregating data on a field from a related object. Examples: Source City.currency from Country.currency ElasticGraph.define_schema do |schema| schema.object_type \"Country\" do |t| t.field \"id\", \"ID\" t.field \"name\", \"String\" t.field \"currency\", \"String\" t.relates_to_one \"capitalCity\", \"City\", via: \"capitalCityId\", dir: :out t.index \"countries\" end schema.object_type \"City\" do |t| t.field \"id\", \"ID\" t.field \"name\", \"String\" t.relates_to_one \"capitalOf\", \"Country\", via: \"capitalCityId\", dir: :in t.field \"currency\", \"String\" do |f| f.sourced_from \"capitalOf\", \"currency\" end t.index \"cities\" end end Parameters: relationship (String) — name of a relationship defined with TypeWithSubfields#relates_to_one using an inbound foreign key which contains the the field you wish to source values from field_path (String) — dot-separated path to the field on the related type containing values that should be copied to this field #sub_aggregatable? ⇒ Boolean Indicates if this field can be used as the basis for a sub-aggregation. Sub-aggregatable fields will be available under subAggregations for an aggregations query. Only nested fields, and object fields which have nested fields, can be sub-aggregated. (Boolean) #type ⇒ TypeReference Returns the type of this field. (TypeReference) — the type of this field Returns true if this field exists only in the GraphQL schema and is not indexed. Returns name of the field. Returns the name of this field in the datastore index. Returns schema definition state. Indicates if this field is aggregatable. Aggregatable fields will be available under aggregatedValues for an aggregations query. Aggregatability is inferred based on the field type and mapping type, or you can use the aggregatable: true option to force it. Note: ElasticGraph takes care of defining arguments for all the query features it supports, so there is generally no need to use this API, and it has no way to interpret arbitrary arguments defined on a field. However, it can be useful for extensions that extend the GraphQL query engine. For example, Apollo uses this API to satisfy the Apollo federation subgraph spec. Defines an argument on the field. Note: For each field defined in your schema that is aggregatable, a corresponding aggregatedValues field will be created on the *AggregatedValues type derived from the parent object type. This method returns an undefined value.Registers a customization callback that will be applied to the corresponding aggregatedValues field that will be generated for this field. Note: For each field defined in your schema that is filterable, a corresponding filtering field will be created on the *FilterInput type derived from the parent object type. This method returns an undefined value.Registers a customization callback that will be applied to the corresponding filtering field that will be generated for this field. Note: For each field defined in your schema that is groupable, a corresponding groupedBy field will be created on the *AggregationGroupedBy type derived from the parent object type. This method returns an undefined value.Registers a customization callback th         "title": "API Documentation - Class: ElasticGraph::SchemaDefinition::SchemaElements::InterfaceType",
        "content": "Index (I) » ElasticGraph » SchemaDefinition » SchemaElements » InterfaceType Class: ElasticGraph::SchemaDefinition::SchemaElements::InterfaceType Inherits: TypeWithSubfields Object Struct TypeWithSubfields ElasticGraph::SchemaDefinition::SchemaElements::InterfaceType show all Includes: Mixins::HasIndices, Mixins::ImplementsInterfaces elasticgraph-schema_definition/lib/elastic_graph/schema_definition/schema_elements/interface_type.rb Defines a GraphQL interface. Use it to define an abstract supertype with one or more fields that concrete implementations of the interface must also define. Each implementation can be an ObjectType or InterfaceType. Examples: Define an interface ElasticGraph.define_schema do |schema| schema.interface_type \"Athlete\" do |t| # in the block, `t` is an InterfaceType end end Constant Summary Constants included from Mixins::HasTypeInfo Mixins::HasTypeInfo::CUSTOMIZABLE_DATASTORE_PARAMS Instance Attribute Summary Attributes included from Mixins::HasDocumentation #doc_comment Method Summary Methods included from Mixins::HasIndices #derive_indexed_type_fields, #derived_indexed_types, #index, #indexed?, #plural_root_query_field_name, #root_query_fields, #singular_root_query_field_name Methods included from Mixins::ImplementsInterfaces #implemented_interfaces, #implements, #to_sdl Methods inherited from TypeWithSubfields #deleted_field, #field, #name, #paginated_collection_field, #relates_to_many, #relates_to_one, #renamed_from Methods included from Mixins::HasTypeInfo #json_schema, #json_schema_options, #mapping, #mapping_options Methods included from Mixins::HasDerivedGraphQLTypeCustomizations #customize_derived_type_fields, #customize_derived_types Methods included from Mixins::HasDirectives #directive, #directives, #directives_sdl Methods included from Mixins::HasDocumentation #append_to_documentation, #derived_documentation, #documentation, #formatted_documentation Methods included from Mixins::CanBeGraphQLOnly #graphql_on         "title": "API Documentation - Class: ElasticGraph::SchemaDefinition::SchemaElements::Relationship",
        "content": "Index (R) » ElasticGraph » SchemaDefinition » SchemaElements » Relationship Class: ElasticGraph::SchemaDefinition::SchemaElements::Relationship Inherits: Field Object Struct Field ElasticGraph::SchemaDefinition::SchemaElements::Relationship show all elasticgraph-schema_definition/lib/elastic_graph/schema_definition/schema_elements/relationship.rb Wraps a Field to provide additional relationship-specific functionality when defining a field via TypeWithSubfields#relates_to_one or TypeWithSubfields#relates_to_many. Examples: Define relationships between two types ElasticGraph.define_schema do |schema| schema.object_type \"Orchestra\" do |t| t.field \"id\", \"ID\" t.relates_to_many \"musicians\", \"Musician\", via: \"orchestraId\", dir: :in, singular: \"musician\" do |r| # In this block, `r` is a `Relationship`. end t.index \"orchestras\" end schema.object_type \"Musician\" do |t| t.field \"id\", \"ID\" t.field \"instrument\", \"String\" t.relates_to_one \"orchestra\", \"Orchestra\", via: \"orchestraId\", dir: :out do |r| # In this block, `r` is a `Relationship`. end t.index \"musicians\" end end Constant Summary Constants included from Mixins::HasTypeInfo Mixins::HasTypeInfo::CUSTOMIZABLE_DATASTORE_PARAMS Instance Attribute Summary collapse #related_type ⇒ ObjectType, ... readonly The type this relationship relates to. Attributes inherited from Field #graphql_only, #name, #name_in_index, #schema_def_state Attributes included from Mixins::HasDocumentation #doc_comment Instance Method Summary collapse #additional_filter(filter) ⇒ void Adds additional filter conditions to a relationship beyond the foreign key. #equivalent_field(path, locally_named: path) ⇒ void Indicates that path (a field on the related type) is the equivalent of locally_named on this type. Methods inherited from Field #aggregatable?, #argument, #customize_aggregated_values_field, #customize_filter_field, #customize_grouped_by_field, #customize_sort_order_enum_values, #customize_sub_aggregations_field, #filterable?, #groupable?, #json_schema, #mapping_type, #on_each_generated_schema_element, #renamed_from, #sortable?, #sourced_from, #sub_aggregatable?, #type Methods included from Mixins::HasTypeInfo #json_schema, #json_schema_options, #mapping, #mapping_options Methods included from Mixins::HasDirectives #directive, #directives, #directives_sdl Methods included from Mixins::HasDocumentation #append_to_documentation, #derived_documentation, #documentation, #formatted_documentation Methods included from Mixins::VerifiesGraphQLName verify_name! Instance Attribute Details #related_type ⇒ ObjectType, ... (readonly) Returns the type this relationship relates to. (ObjectType, InterfaceType, UnionType) — the type this relationship relates to Instance Method Details #additional_filter(filter) ⇒ void This method returns an undefined value.Adds additional filter conditions to a relationship beyond the foreign key. Examples: Define additional filter conditions on a relates_to_one relationship ElasticGraph.define_schema do |schema| schema.object_type \"Orchestra\" do |t| t.field \"id\", \"ID\" t.relates_to_many \"musicians\", \"Musician\", via: \"orchestraId\", dir: :in, singular: \"musician\" t.relates_to_one \"firstViolin\", \"Musician\", via: \"orchestraId\", dir: :in do |r| r.additional_filter isFirstViolon: true end t.index \"orchestras\" end schema.object_type \"Musician\" do |t| t.field \"id\", \"ID\" t.field \"instrument\", \"String\" t.field \"isFirstViolon\", \"Boolean\" t.relates_to_one \"orchestra\", \"Orchestra\", via: \"orchestraId\", dir: :out t.index \"musicians\" end end Parameters: filter (Hash<Symbol, Object>, Hash<String, Object>) — additional filter conditions for this relationship #equivalent_field(path, locally_named: path) ⇒ void This method returns an undefined value.Indicates that path (a field on the related type) is the equivalent of locally_named on this type. Use this API to specify a local field’s equivalent path on the related type. This must be used on relationships used by Field#sourced_from when the local type uses Indexing::Index#route_with or Indexing::Index#rollover so that ElasticGraph can determine what field from the related type to use to route the update requests to the correct index and shard. Examples: ElasticGraph.define_schema do |schema| schema.object_type \"Campaign\" do |t| t.field \"id\", \"ID!\" t.field \"name\", \"String\" t.field \"createdAt\", \"DateTime\" t.relates_to_one \"launchPlan\", \"CampaignLaunchPlan\", via: \"campaignId\", dir: :in do |r| r.equivalent_field \"campaignCreatedAt\", locally_named: \"createdAt\" end t.field \"launchDate\", \"Date\" do |f| f.sourced_from \"launchPlan\", \"launchDate\" end t.index \"campaigns\"do |i| i.rollover :yearly, \"createdAt\" end end schema.object_type \"CampaignLaunchPlan\" do |t| t.field \"id\", \"ID\" t.field \"campaignId\", \"ID\" t.field \"campaignCreatedAt\", \"DateTime\" t.field \"launchDate\", \"Date\" t.index \"campaign_launch_plans\" end end Parameters: path (String) — path to a routing or rollover field on the related type locally_named (String) (defaults to: path) — path on the local type to the equivalent field Returns the type this relationship relates to. This method returns an undefined value.Adds additional filter conditions to a relationship beyond the foreign key. This method returns an undefined value.Indicates that path (a field on the related type) is the equivalent of locally_named on this type. Use this API to specify a local field’s equivalent path on the related type. This must be used on relationships used by Field#sourced_from when the local type uses Indexing::Index#route_with or Indexing::Index#rollover so that ElasticGraph can determine what field from the related type to use to route the update requests to the correct index and shard.",

    window.store["/docs/v0.19.1.1/ElasticGraph/SchemaDefinition/SchemaElements/ScalarType.html"] = {
        "title": "API Documentation - Class: ElasticGraph::SchemaDefinition::SchemaElements::ScalarType",
        "content": "Index (S) » ElasticGraph » SchemaDefinition » SchemaElements » ScalarType Class: ElasticGraph::SchemaDefinition::SchemaElements::ScalarType Inherits: Struct Object Struct ElasticGraph::SchemaDefinition::SchemaElements::ScalarType show all Includes: Mixins::CanBeGraphQLOnly, Mixins::HasDerivedGraphQLTypeCustomizations, Mixins::HasDirectives, Mixins::HasDocumentation, Mixins::HasTypeInfo, Mixins::VerifiesGraphQLName elasticgraph-schema_definition/lib/elastic_graph/schema_definition/schema_elements/scalar_type.rb Defines a GraphQL scalar type. ElasticGraph itself uses this to define a few common scalar types (e.g. Date and DateTime), but it is also available to you to use to define your own custom scalar types. Examples: Define a scalar type ElasticGraph.define_schema do |schema| schema.scalar_type \"URL\" do |t| t.mapping type: \"keyword\" t.json_schema type: \"string\", format: \"uri\" end end Constant Summary Constants included from Mixins::HasTypeInfo Mixins::HasTypeInfo::CUSTOMIZABLE_DATASTORE_PARAMS Instance Attribute Summary collapse #schema_def_state ⇒ State readonly Schema definition state. Attributes included from Mixins::HasDocumentation #doc_comment Instance Method Summary collapse #coerce_with(adapter_name, defined_at:) ⇒ void Specifies the scalar coercion adapter that should be used for this scalar type. #mapping(**options) ⇒ void Defines the Elasticsearch/OpenSearch field mapping type and mapping parameters for a field or type. #name ⇒ String Name of the scalar type. #prepare_for_indexing_with(preparer_name, defined_at:) ⇒ void Specifies an indexing preparer that should be used for this scalar type. #to_sdl ⇒ String The GraphQL SDL form of this scalar. Methods included from Mixins::HasTypeInfo #json_schema, #json_schema_options, #mapping_options Methods included from Mixins::HasDerivedGraphQLTypeCustomizations #customize_derived_type_fields, #customize_derived_types Methods included from Mixins::HasDirectives #directive, #directives, #directives_sdl Methods included from Mixins::HasDocumentation #append_to_documentation, #derived_documentation, #documentation, #formatted_documentation Methods included from Mixins::CanBeGraphQLOnly #graphql_only, #graphql_only? Methods included from Mixins::VerifiesGraphQLName verify_name! Instance Attribute Details #schema_def_state ⇒ State (readonly) Returns schema definition state. (State) — schema definition state Instance Method Details #coerce_with(adapter_name, defined_at:) ⇒ void Note: For examples of scalar coercion adapters, see ElasticGraph::GraphQL::ScalarCoercionAdapters. Note: If the defined_at require path requires any directories be put on the Ruby $LOAD_PATH, you are responsible for doing that before booting GraphQL. This method returns an undefined value.Specifies the scalar coercion adapter that should be used for this scalar type. The scalar coercion adapter is responsible for validating and coercing scalar input values, and converting scalar return values to a form suitable for JSON serialization. Examples: Register a coercion adapter ElasticGraph.define_schema do |schema| schema.scalar_type \"PhoneNumber\" do |t| t.mapping type: \"keyword\" t.json_schema type: \"string\", pattern: \"^\\\\+[1-9][0-9]{1,14}$\" t.coerce_with \"CoercionAdapters::PhoneNumber\", defined_at: \"./coercion_adapters/phone_number\" end end Parameters: adapter_name (String) — fully qualified Ruby class name of the adapter defined_at (String) — the require path of the adapter #mapping(**options) ⇒ void This method returns an undefined value.Defines the Elasticsearch/OpenSearch field mapping type and mapping parameters for a field or type. The options passed here will be included in the generated datastore_config.yaml artifact that ElasticGraph uses to configure Elasticsearch/OpenSearch. Can be called multiple times; each time, the options will be merged into the existing options. This is required on a ElasticGraph::SchemaDefinition::SchemaElements::ScalarType; without it, ElasticGraph would have no way to know how the datatype should be indexed in the datastore. On a Field, this can be used to customize how a field is indexed. For example, String fields are normally indexed as keywords; to instead index a String field for full text search, you’d need to configure mapping type: \"text\". On a ObjectType, this can be used to use a specific Elasticsearch/OpenSearch data type for something that is modeled as an object in GraphQL. For example, we use it for the GeoLocation type so they get indexed in Elasticsearch using the geo_point type. Examples: Define the mapping of a custom scalar type ElasticGraph.define_schema do |schema| schema.scalar_type \"URL\" do |t| t.mapping type: \"keyword\" t.json_schema type: \"string\", format: \"uri\" end end Customize the mapping of a field ElasticGraph.define_schema do |schema| schema.object_type \"Card\" do |t| t.field \"id\", \"ID!\" t.field \"cardholderName\", \"String\" do |f| # index this field for full text search f.mapping type: \"text\" end t.field \"expYear\", \"Int\" do |f| # Use a smaller numeric type to save space in the datastore f.mapping type: \"short\" f.json_schema minimum: 2000, maximum: 2099 end t.field \"expMonth\", \"Int\" do |f| # Use a smaller numeric type to save space in the datastore f.mapping type: \"byte\" f.json_schema minimum: 1, maximum: 12 end t.index \"cards\" end end Parameters: options (Hash<Symbol, Object>) — mapping options–must be limited to Mixins::HasTypeInfo::CUSTOMIZABLE_DATASTORE_PARAMS #name ⇒ String Returns name of the scalar type. (String) — name of the scalar type #prepare_for_indexing_with(preparer_name, defined_at:) ⇒ void Note: For examples of scalar coercion adapters, see ElasticGraph::Indexer::IndexingPreparers. Note: If the defined_at require path requires any directories be put on the Ruby $LOAD_PATH, you are responsible for doing that before booting GraphQL. This method returns an undefined value.Specifies an indexing preparer that should be used for this scalar type. The indexing preparer is responsible for preparing scalar values before indexing them, performing any desired formatting or normalization. Examples: Register an indexing preparer ElasticGraph.define_schema do |schema| schema.scalar_type \"PhoneNumber\" do |t| t.mapping type: \"keyword\" t.json_schema type: \"string\", pattern: \"^\\\\+[1-9][0-9]{1,14}$\" t.prepare_for_indexing_with \"IndexingPreparers::PhoneNumber\", defined_at: \"./indexing_preparers/phone_number\" end end Parameters: preparer_name (String) — fully qualified Ruby class name of the indexing preparer defined_at (String) — the require path of the preparer #to_sdl ⇒ String Returns the GraphQL SDL form of this scalar. (String) — the GraphQL SDL form of this scalar Returns schema definition state. Note: For examples of scalar coercion adapters, see ElasticGraph::GraphQL::ScalarCoercionAdapters. Note: If the defined_at require path requires any directories be put on the Ruby $LOAD_PATH, you are responsible for doing that before booting GraphQL. This method returns an undefined value.Specifies the scalar coercion adapter that should be used for this scalar type. The scalar coercion adapter is responsible for validating and coercing scalar input values, and converting scalar return values to a form suitable for JSON serialization. This method returns an undefined value.Defines the Elasticsearch/OpenSearch field mapping type and mapping parameters for a field or type. The options passed here will be included in the generated datastore_config.yaml artifact that ElasticGraph uses to configure Elasticsearch/OpenSearch. Can be called multiple times; each time, the options will be merged into the existing options. This is required on a ElasticGraph::SchemaDefinition::SchemaElements::ScalarType; without it, ElasticGraph would have no way to know how the datatype should be indexed in the datastore. On a Field, this can be used to customize how a field is indexed. For example, String fields are normally indexed as keywords; to instead index a String field for full text search, you’d need to configure mapping type: \"text\". On a ObjectType, this can be used to use a specific Elasticsearch/OpenSearch data type for something that is modeled as an object in GraphQL. For example, we use it for the GeoLocation type so they get indexed in Elasticsearch using the geo_point type. Returns name of the scalar type. Note: For examples of scalar coercion adapters, see ElasticGraph::Indexer::IndexingPreparers. Note: If the defined_at require path requires any directories be put on the Ruby $LOAD_PATH, you are responsible for doing that before booting GraphQL. This method returns an undefined value.Specifies an indexing preparer that should be used for this scalar type. The indexing preparer is responsible for preparing scalar values before indexing them, performing any desired formatting or normalization. Returns the GraphQL SDL form of this scalar.",

    window.store["/docs/v0.19.1.1/ElasticGraph/SchemaDefinition/SchemaElements/TypeWithSubfields.html"] = {
        "title": "API Documentation - Class: ElasticGraph::SchemaDefinition::SchemaElements::TypeWithSubfields",
        "content": "Index (T) » ElasticGraph » SchemaDefinition » SchemaElements » TypeWithSubfields Class: ElasticGraph::SchemaDefinition::SchemaElements::TypeWithSubfields Abstract Inherits: Struct Object Struct ElasticGraph::SchemaDefinition::SchemaElements::TypeWithSubfields show all Includes: Mixins::CanBeGraphQLOnly, Mixins::HasDerivedGraphQLTypeCustomizations, Mixins::HasDirectives, Mixins::HasDocumentation, Mixins::HasTypeInfo, Mixins::VerifiesGraphQLName elasticgraph-schema_definition/lib/elastic_graph/schema_definition/schema_elements/type_with_subfields.rb This class is abstract. Defines common functionality for all GraphQL types that have subfields: InputType InterfaceType ObjectType Direct Known Subclasses InterfaceType, ObjectType Constant Summary Constants included from Mixins::HasTypeInfo Mixins::HasTypeInfo::CUSTOMIZABLE_DATASTORE_PARAMS Instance Attribute Summary Attributes included from Mixins::HasDocumentation #doc_comment Instance Method Summary collapse #deleted_field(field_name) ⇒ void Registers the name of a field that existed in a prior version of the schema but has been deleted. #field(name, type, graphql_only: false, indexing_only: false, **options) {|Field| ... } ⇒ void Defines a GraphQL field on this type. #name ⇒ String The name of this GraphQL type. #paginated_collection_field(name, element_type, name_in_index: name, singular: nil) {|Field| ... } ⇒ void An alternative to #field for when you have a list field that you want exposed as a paginated Relay connection rather than as a simple list. #relates_to_many(field_name, type, via:, dir:, singular:) {|Relationship| ... } ⇒ void Defines a “has many” relationship between the current indexed type and another indexed type by defining a pair of fields clients can use to navigate across indexed types in a single GraphQL query. #relates_to_one(field_name, type, via:, dir:) {|Relationship| ... } ⇒ void Defines a “has one” relationship between the current indexed type and another indexed type by defining a field clients can use to navigate across indexed types in a single GraphQL query. #renamed_from(old_name) ⇒ void Registers an old name that this type used to have in a prior version of the schema. Methods included from Mixins::HasTypeInfo #json_schema, #json_schema_options, #mapping, #mapping_options Methods included from Mixins::HasDerivedGraphQLTypeCustomizations #customize_derived_type_fields, #customize_derived_types Methods included from Mixins::HasDirectives #directive, #directives, #directives_sdl Methods included from Mixins::HasDocumentation #append_to_documentation, #derived_documentation, #documentation, #formatted_documentation Methods included from Mixins::CanBeGraphQLOnly #graphql_only, #graphql_only? Methods included from Mixins::VerifiesGraphQLName verify_name! Instance Method Details #deleted_field(field_name) ⇒ void Note: In situations where this API applies, ElasticGraph will give you an error message indicating that you need to use this API or Field#renamed_from. Likewise, when ElasticGraph no longer needs to know about this, it’ll give you a warning indicating the call to this method can be removed. This method returns an undefined value.Registers the name of a field that existed in a prior version of the schema but has been deleted. Examples: Indicate that Widget.description has been deleted ElasticGraph.define_schema do |schema| schema.object_type \"Widget\" do |t| t.deleted_field \"description\" end end Parameters: field_name (String) — name of field that used to exist but has been deleted #field(name, type, graphql_only: false, indexing_only: false, **options) {|Field| ... } ⇒ void Note: Be careful about defining non-nullable fields. Changing a field’s type from non-nullable (e.g. Int!) to nullable (e.g. Int) is a breaking change for clients. Making a field non-nullable may also prevent you from applying permissioning to a field via an AuthZ layer (as such a layer would have no way to force a field value to null when for a client denied field access). Therefore, we recommend limiting your use of ! to only a few situations such as defining a type’s primary key (e.g. t.field \"id\", \"ID!\") or defining a list field (e.g. t.field \"authors\", \"[String!]!\") since empty lists already provide a “no data” representation. You can still configure the ElasticGraph indexer to require a non-null value for a field using f.json_schema nullable: false. Note: ElasticGraph’s understanding of datastore capabilities may override your configured aggregatable/filterable/groupable/sortable options. For example, a field indexed as text for full text search will not be sortable or groupable even if you pass sortable: true, groupable: true when defining the field, because text fields cannot be efficiently sorted by or grouped on. This method returns an undefined value.Defines a GraphQL field on this type. Examples: Define a field with documentation ElasticGraph.define_schema do |schema| schema.object_type \"Campaign\" do |t| t.field \"id\", \"ID\" do |f| f.documentation \"The Campaign's identifier.\" end end end Omit a new field from the GraphQL schema until its data has been backfilled ElasticGraph.define_schema do |schema| schema.object_type \"Campaign\" do |t| t.field \"id\", \"ID\" # TODO: remove `indexing_only: true` once the data for this field has been fully backfilled t.field \"endDate\", \"Date\", indexing_only: true end end Use graphql_only to introduce a new name for an existing field ElasticGraph.define_schema do |schema| schema.object_type \"Campaign\" do |t| t.field \"id\", \"ID\" t.field \"endOn\", \"Date\" do |f| f.directive \"deprecated\", reason: \"Use `endDate` instead.\" end # We've decided we want to call the field `endDate` instead of `endOn`, but the data # for this field is currently indexed in `endOn`, so we can use `graphql_only` and # `name_in_index` to expose the existing data under a new field name. t.field \"endDate\", \"Date\", name_in_index: \"endOn\", graphql_only: true end end Parameters: name (String) — name of the field type (String) — type of the field as a type reference. The named type must be one of ElasticGraph’s built-in types or a type that has been defined in your schema. graphql_only (Boolean) (defaults to: false) — if true, ElasticGraph will define the field as a GraphQL field but omit it from the indexing artifacts (json_schemas.yaml and datastore_config.yaml). This can be used along with name_in_index to support careful schema evolution. indexing_only (Boolean) (defaults to: false) — if true, ElasticGraph will define the field for indexing (in the json_schemas.yaml and datastore_config.yaml schema artifact) but will omit it from the GraphQL schema. This can be useful to begin indexing a field before you expose it in GraphQL so that you can fully backfill it first. options (Hash) — a customizable set of options Options Hash (**options): name_in_index (String) — the name of the field in the datastore index. Can be used to back a GraphQL field with a differently named field in the index. singular (String) — can be used on a list field (e.g. t.field \"tags\", \"[String!]!\", singular: \"tag\") to tell ElasticGraph what the singular form of a field’s name is. When provided, ElasticGraph will define a groupedBy field (using the singular form) allowing clients to group by individual values from the field. aggregatable (Boolean) — force-enables or disables the ability for aggregation queries to aggregate over this field. When not provided, ElasticGraph will infer field aggregatability based on the field’s GraphQL type and mapping type. filterable (Boolean) — force-enables or disables the ability for queries to filter by this field. When not provided, ElasticGraph will infer field filterability based on the field’s GraphQL type and mapping type. groupable (Boolean) — force-enables or disables the ability for aggregation queries to group by this field. When not provided, ElasticGraph will infer field groupability based on the field’s GraphQL type and mapping type. sortable (Boolean) — force-enables or disables the ability for queries to sort by this field. When not provided, ElasticGraph will infer field sortability based on the field’s GraphQL type and mapping type. Yields: (Field) — the field for further customization See Also: #paginated_collection_field #relates_to_many #relates_to_one #name ⇒ String Returns the name of this GraphQL type. (String) — the name of this GraphQL type #paginated_collection_field(name, element_type, name_in_index: name, singular: nil) {|Field| ... } ⇒ void Note: Bear in mind that pagination does not have much efficiency benefit in this case: all elements of the collection will be retrieved when fetching this field from the datastore. The pagination implementation will just trim down the collection before returning it. This method returns an undefined value.An alternative to #field for when you have a list field that you want exposed as a paginated Relay connection rather than as a simple list. Examples: Define Author.books as a paginated collection field ElasticGraph.define_schema do |schema| schema.object_type \"Author\" do |t| t.field \"id\", \"ID\" t.field \"name\", \"String\" t.paginated_collection_field \"books\", \"String\" t.index \"authors\" end end Parameters: name (String) — name of the field element_type (String) — name of the type of element in the collection name_in_index (String) (defaults to: name) — the name of the field in the datastore index. Can be used to back a GraphQL field with a differently named field in the index. singular (String) (defaults to: nil) — indicates what the singular form of a field’s name is. When provided, ElasticGraph will define a groupedBy field (using the singular form) allowing clients to group by individual values from the field. Yields: (Field) — the field for further customization See Also: #field #relates_to_many #relates_to_one #relates_to_many(field_name, type, via:, dir:, singular:) {|Relationship| ... } ⇒ void This method returns an undefined value.Defines a “has many” relationship between the current indexed type and another indexed type by defining a pair of fields clients can use to navigate across indexed types in a single GraphQL query. The pair of generated fields will be Relay Connection types allowing you to filter, sort, paginate, and aggregated the related data. Examples: Use relates_to_many to define Team.players and Team.playerAggregations ElasticGraph.define_schema do |schema| schema.object_type \"Team\" do |t| t.field \"id\", \"ID\" t.field \"name\", \"String\" t.field \"homeCity\", \"String\" t.relates_to_many \"players\", \"Player\", via: \"teamId\", dir: :in, singular: \"player\" t.index \"teams\" end schema.object_type \"Player\" do |t| t.field \"id\", \"ID\" t.field \"name\", \"String\" t.field \"teamId\", \"ID\" t.index \"players\" end end Parameters: field_name (String) — name of the relationship field type (String) — name of the related type via (String) — name of the foreign key field dir (:in, :out) — direction of the foreign key. Use :in for an inbound foreign key that resides on the related type and references the id of this type. Use :out for an outbound foreign key that resides on this type and references the id of the related type. singular (String) — singular form of the field_name; will be used (along with an Aggregations suffix) for the name of the generated aggregations field Yields: (Relationship) — the generated relationship fields, for further customization See Also: #field #paginated_collection_field #relates_to_one #relates_to_one(field_name, type, via:, dir:) {|Relationship| ... } ⇒ void This method returns an undefined value.Defines a “has one” relationship between the current indexed type and another indexed type by defining a field clients can use to navigate across indexed types in a single GraphQL query. Examples: Use relates_to_one to define Player.team ElasticGraph.define_schema do |schema| schema.object_type \"Team\" do |t| t.field \"id\", \"ID\" t.field \"name\", \"String\" t.field \"homeCity\", \"String\" t.index \"teams\" end schema.object_type \"Player\" do |t| t.field \"id\", \"ID\" t.field \"name\", \"String\" t.relates_to_one \"team\", \"Team\", via: \"teamId\", dir: :out t.index \"players\" end end Parameters: field_name (String) — name of the relationship field type (String) — name of the related type via (String) — name of the foreign key field dir (:in, :out) — direction of the foreign key. Use :in for an inbound foreign key that resides on the related type and references the id of this type. Use :out for an outbound foreign key that resides on this type and references the id of the related type. Yields: (Relationship) — the generated relationship fields, for further customization See Also: #field #relates_to_many #renamed_from(old_name) ⇒ void Note: In situations where this API applies, ElasticGraph will give you an error message indicating that you need to use this API or API#deleted_type. Likewise, when ElasticGraph no longer needs to know about this, it’ll give you a warning indicating the call to this method can be removed. This method returns an undefined value.Registers an old name that this type used to have in a prior version of the schema. Examples: Indicate that Widget used to be called Component. ElasticGraph.define_schema do |schema| schema.object_type \"Widget\" do |t| t.renamed_from \"Component\" end end Parameters: old_name (String) — old name this field used to have in a prior version of the schema Note: In situations where this API applies, ElasticGraph will give you an error message indicating that you need to use this API or Field#renamed_from. Likewise, when ElasticGraph no longer needs to know about this, it’ll give you a warning indicating the call to this method can be removed. This method returns an undefined value.Registers the name of a field that existed in a prior version of the schema but has been deleted. Note: Be careful about defining non-nullable fields. Changing a field’s type from non-nullable (e.g. Int!) to nullable (e.g. Int) is a breaking change for clients. Making a field non-nullable may also prevent you from applying permissioning to a field via an AuthZ layer (as such a layer would have no way to force a field value to null when for a client denied field access). Therefore, we recommend limiting your use of ! to only a few situations such as defining a type’s primary key (e.g. t.field \"id\", \"ID!\") or defining a list field (e.g. t.field \"authors\", \"[String!]!\") since empty lists already provide a “no data” representation. You can still configure the ElasticGraph indexer to require a non-null value for a field using f.json_schema nullable: false. Note: ElasticGraph’s understanding of datastore capabilities may override your configured aggregatable/filterable/groupable/sortable options. For example, a field indexed as text for full text search will not be sortable or groupable even if you pass sortable: true, groupable: true when defining the field, because text fields cannot be efficiently sorted by or grouped on. This method returns an undefined value.Defines a GraphQL field on this type. Returns the name of this GraphQL type. Note: Bear in mind that pagination does not have much efficiency benefit in this case: all elements of the collection will be retrieved when fetching this field from the datastore. The pagination implementation will just trim down the collection before returning it. This method returns an undefined value.An alternative to #field for when you have a list field that you want exposed as a paginated Relay connection rather than as a simple list. This method returns an undefined value.Defines a “has many” relationship between the current indexed type and another indexed type by defining a pair of fields clients can use to navigate across indexed types in a single GraphQL query. The pair of generated fields will be Relay Connection types allowing you to filter, sort, paginate, and aggregated the related data. This method returns an undefined value.Defines a “has one” relationship between the current indexed type and another indexed type by defining a field clients can use to navigate across indexed types in a single GraphQL query. Note: In situations where this API applies, ElasticGraph will give you an error message indicating that you need to use this API or API#deleted_type. Likewise, when ElasticGraph no longer needs to know about this, it’ll give you a warning indicating the call to this method can be removed. This method returns an undefined value.Registers an old name that this type used to have in a prior version of the schema.",

    window.store["/docs/v0.19.1.1/file.README.html"] = {
        "title": "API Documentation - File: README",
        "content": "Index » README ElasticGraph ElasticGraph is a general purpose, near real-time data query and search platform that is scalable and performant, serves rich interactive queries, and dramatically simplifies the creation of complex reports. The platform combines the power of indexing and search of Elasticsearch or OpenSearch with the query flexibility of GraphQL language. Optimized for AWS cloud, it also offers scale and reliability. ElasticGraph is a naturally flexible framework with many different possible applications. However, the main motivation we have for building it is to power various data APIs, UIs and reports. These modern reports require filtering and aggregations across a body of ever growing data sets. Modern APIs allow us to: Minimize network trips to retrieve your data Get exactly what you want in a single query. No over- or under-serving the data. Push filtering complex calculations to the backend. Versioning Policy ElasticGraph does not strictly follow the SemVer spec. We followed that early in the project’s life cycle and realized that it obscures some important compatibility information. ElasticGraph’s versioning policy is designed to communicate compatibility information related to the following stakeholders: Application maintainers: engineers that define an ElasticGraph schema, maintain project configuration, and perform upgrades. Data publishers: systems that publish data into an ElasticGraph application for ingestion by an ElasticGraph indexer. GraphQL clients: clients of the GraphQL API of an ElasticGraph application. We use the following versioning scheme: Version numbers are in a 0.MAJOR.MINOR.PATCH format. (The 0. prefix is there in order to reserve 1.0.0 and all later versions for after ElasticGraph has been open-sourced). Increments to the PATCH version indicate that the new release contains no backwards incompatibilities for any stakeholders. It may contain bug fixes, new features, internal refactorings, and dependency upgrades, among other things. You can expect that PATCH level upgrades are always safe–just update the version in your bundle, generate new schema artifacts, and you should be done. Increments to the MINOR version indicate that the new release contains some backwards incompatibilities that may impact the application maintainers of some ElasticGraph applications. MINOR releases may include renames to configuration settings, changes to the schema definition API, and new schema definition requirements, among other things. You can expect that MINOR level upgrades can usually be done in 30 minutes or less (usually in a single commit!), with release notes and clear errors from ElasticGraph command line tasks providing guidance on how to upgrade. Increments to the MAJOR version indicate that the new release contains some backwards incompatibilities that may impact the data publishers or GraphQL clients of some ElasticGraph applications. MAJOR releases may include changes to the GraphQL schema that require careful migration of GraphQL clients or changes to how indexing is done that require a dataset to be re-indexed from scratch (e.g. by having data publishers republish their data into an ElasticGraph indexer running the new version). You can expect that the release notes will include detailed instructions on how to perform a MAJOR version upgrade. Deprecation warnings may be included at any of these levels–for example, a PATCH release may contain a deprecation warning for a breaking change that may impact application maintainers in an upcoming MINOR release, and a MINOR release may contain deprecation warnings for breaking changes that may impact data publishers or GraphQL clients in an upcoming MAJOR release. Each version level is cumulative over the prior levels. That is, a MINOR release may include PATCH-level changes in addition to backwards incompatibilities that may impact application maintainers. A MAJOR release may include PATCH-level or MINOR-level changes in addition to backwards incompatibilities that may impact data publishers or GraphQL clients. Note that this policy was first adopted in the v0.15.1.0 release. All prior releases aimed (with some occasional mistakes!) to follow SemVer with a 0.MAJOR.MINOR.PATCH versioning scheme. Note that all gems in this repository share the same version number. Every time we cut a release, we increment the version for all gems and release all gems, even if a gem has had no changes since the last release. This is simpler to work with than the alternatives. License ElasticGraph is released under the MIT License. Part of the distributed code comes from the GraphiQL project, also licensed under the MIT License, Copyright (c) GraphQL Contributors.",
        "url": "/elasticgraph/docs/v0.19.1.1/file.README.html"
    };

    window.store["/about/"] = {
        "title": "What is ElasticGraph?",
        "content": "What is ElasticGraph? ElasticGraph is a general purpose, near real-time data query and search platform that is scalable and performant, serves rich interactive queries, and dramatically simplifies the creation of complex reports. The platform combines the power of indexing and search of Elasticsearch or OpenSearch with the query flexibility of GraphQL language. Optimized for AWS cloud, it also offers scale and reliability. ElasticGraph is a naturally flexible framework with many different possible applications. However, the main motivation we have for building it is to power various data APIs, UIs and reports. These modern reports require filtering and aggregations across a body of ever growing data sets. Modern APIs allow us to: Minimize network trips to retrieve your data Get exactly what you want in a single query. No over- or under-serving the data. Push filtering complex calculations to the backend. What can I do with it? The ElasticGraph platform will allow you to query your data in many different configurations. To do so requires defining a schema which ElasticGraph will use to both index data and also query it. Besides all basic GraphQL query features, ElasticGraph also supports: Real-time indexing and data querying Filtering, sorting, pagination, grouping, aggregations, and sub-aggregations Navigating across data sets in a single query Robust, safe schema evolution support via Query Registry mechanism Derived indexes to power commonly accessed queries and aggregations Client and Publisher libraries Get started Our Getting Started guide will help you get up and running in about 10 minutes.",

    window.store["/getting-started/"] = {
        "title": "Getting Started with ElasticGraph",
        "content": "Getting Started with ElasticGraph Welcome to ElasticGraph! This guide will help you set up ElasticGraph locally, run queries using GraphiQL, and evolve an example schema. By the end of this tutorial, you’ll have a working ElasticGraph instance running on your machine. Estimated Time to Complete: Approximately 10 minutes Prerequisites Before you begin, ensure you have the following installed on your system: Docker and Docker Compose Ruby (version 3.3 or higher) Git Confirm these are installed using your terminal: $ ruby -v ruby 3.4.1 (2024-12-25 revision 48d4efcb85) +PRISM [arm64-darwin24] $ docker compose version Docker Compose version v2.32.4-desktop.1 $ git -v git version 2.46.0 Note: you don’t need these exact versions (these are just examples). Your Ruby version does need to be 3.3.x or greater, though. Step 1: Bootstrap a new ElasticGraph Project Run the following command in your terminal: $ gem exec elasticgraph new path/to/project --datastore elasticsearch # or $ gem exec elasticgraph new path/to/project --datastore opensearch Note Not sure whether to use Elasticsearch or OpenSearch? We recommend using whichever has better support in your organization. ElasticGraph works identically with both, and the choice makes no difference in the tutorial that follows. This will: Generate a project skeleton with an example schema Install dependencies including the latest version of ElasticGraph itself Dump schema artifacts Run the build tasks (including your new project’s test suite) Initialize the project as a git repository Commit the initial setup Step 2: Boot Locally The initial project skeleton comes with everything you need to run ElasticGraph locally. Confirm it works by running the following: $ cd path/to/project $ bundle exec rake boot_locally This will: Boot the datastore (Elasticsearch or OpenSearch) using Docker Configure the datastore using the dumped datastore_config.yaml schema artifact Index some randomly generated artists/albums/tours/shows/venues data Boot ElasticGraph and a GraphiQL UI Open the GraphiQL UI in your browser Run some example queries in GraphiQL to confirm it’s working. Here’s an example query to get you started: query FindArtistsFormedIn90s { artists(filter: { bio: {yearFormed: {gte: 1990, lt: 2000}} }) { nodes { name bio { yearFormed } albums { name } } } } Visit the Query API docs for other example queries that work against the example schema. Step 3: Add a new field to the Schema If this is your first ElasticGraph project, we recommend you add a new field to the example schema to get a feel for how it works. (Feel free to skip this step if you’ve worked in an ElasticGraph project before). Let’s add a Venue.yearOpened field to our schema. Here’s a git diff showing what to change: diff --git a/config/schema/artists.rb b/config/schema/artists.rb index 77e63de..7999fe4 100644 --- a/config/schema/artists.rb +++ b/config/schema/artists.rb @@ -56,6 +56,9 @@ ElasticGraph.define_schema do |schema| schema.object_type \"Venue\" do |t| t.field \"id\", \"ID\" t.field \"name\", \"String\" + t.field \"yearOpened\", \"Int\" do |f| + f.json_schema minimum: 1900, maximum: 2100 + end t.field \"location\", \"GeoLocation\" t.field \"capacity\", \"Int\" t.relates_to_many \"featuredArtists\", \"Artist\", via: \"tours.shows.venueId\", dir: :in, singular: \"featuredArtist\" Next, rebuild the project: $ bundle exec rake build This will re-generate the schema artifacts, run the test suite, and fail. The failing test will indicate that the :venue factory is missing the new field. To fix it, define yearOpened on the :venue factory in the factories.rb file under lib: diff --git a/lib/my_eg_project/factories.rb b/lib/my_eg_project/factories.rb index 0d8659c..509f274 100644 --- a/lib/my_eg_project/factories.rb +++ b/lib/my_eg_project/factories.rb @@ -95,6 +95,7 @@ FactoryBot.define do \"#{city_name} #{venue_type}\" end + yearOpened { Faker::Number.between(from: 1900, to: 2025) } location { build(:geo_location) } capacity { Faker::Number.between(from: 200, to: 100_000) } end Re-run bundle exec rake build and everything should pass. You can also run bundle exec rake boot_locally and query your new field to confirm the fake values being generated for it. Next Steps Congratulations! You’ve set up ElasticGraph locally and run your first queries. Here are some next steps you can take. Replace the Example Schema Delete the artist schema definition: $ rm config/schema/artists.rb Then define your own schema in a Ruby file under config/schema. Use the schema definition API docs as a reference. Run bundle exec rake build and deal with any errors that are reported. Hint: search the project codebase for TODO comments to find things that need updating. Setup a CI Build Your ElasticGraph project includes a command that’s designed to be run on CI: $ bundle exec rake check This should be run on every commit (ideally before merging a pull request) using a CI system such as GitHub Actions, Buildkite, or Circle CI. Deploy ElasticGraph can be deployed in two different ways: As a standard Ruby Rack application using elasticgraph-rack. Similar to a Rails or Sinatra app, you can serve ElasticGraph from any of the webservers that support the Rack spec. Or you could mount your ElasticGraph GraphQL endpoint inside an existing Rails or Sinatra application! As a serverless application in AWS using elasticgraph-graphql_lambda. Connect a Real Data Source Finally, you’ll want to publish into your deployed ElasticGraph project from a real data source. The generated json_schemas.yaml artifact can be used in your publishing system to validate the indexing payloads or for code generation (using a project like json-kotlin-schema-codegen). Resources ElasticGraph Query API Documentation ElasticGraph Ruby API Documentation GraphQL Introduction Feedback We’d love to hear your feedback. If you encounter any issues or have suggestions, please start a discussion in our discord channel or on GitHub. Happy coding with ElasticGraph!",
        "url": "/elasticgraph/getting-started/"
    };

    window.store["/query-api/aggregations/aggregated-values/"] = {
        "title": "ElasticGraph Query API: Aggregated Values",
        "content": "ElasticGraph Query API: Aggregated Values Aggregated values can be computed from all values of a particular field from all documents backing an aggregation node. Here’s an example: query BluegrassArtistLifetimeSales { artistAggregations( filter: {bio: {description: {matchesQuery: {query: \"bluegrass\"}}}} ) { nodes { groupedBy { bio { yearFormed } } aggregatedValues { lifetimeSales { exactMin exactMax exactSum approximateSum approximateAvg } } } } } This example query aggregates the values of the Artist.lifetimeSales field using all 4 of the standard numeric aggregated values: min, max, avg, and sum. These are qualified with approximate or exact to indicate the level of precision they offer. The documentation for approximateSum and exactSum provide more detail: approximateSum The (approximate) sum of the field values within this grouping. Sums of large Int values can result in overflow, where the exact sum cannot fit in a JsonSafeLong return value. This field, as a double-precision Float, can represent larger sums, but the value may only be approximate. exactSum The exact sum of the field values within this grouping, if it fits in a JsonSafeLong. Sums of large Int values can result in overflow, where the exact sum cannot fit in a JsonSafeLong. In that case, null will be returned, and approximateSum can be used to get an approximate value. Besides these standard numeric aggregated values, ElasticGraph offers one more: query SkaArtistHomeCountries { artistAggregations( filter: {bio: {description: {matchesQuery: {query: \"ska\"}}}} ) { nodes { groupedBy { bio { yearFormed } } aggregatedValues { bio { homeCountry { approximateDistinctValueCount } } } } } } The approximateDistinctValueCount field uses the HyperLogLog++ algorithm to provide an approximate count of distinct values for the field. In this case, it can give us an idea of how many countries ska bands were formed in, in each year.",
        "url": "/elasticgraph/query-api/aggregations/aggregated-values/"
    };

        "content": "ElasticGraph Query API: Aggregation Counts The aggregations API allows you to count documents within a grouping: query ArtistCountsByCountry { artistAggregations { nodes { groupedBy { bio { homeCountry } } count } } } This query, for example, returns a grouping for each country, and provides a count of how many artists call each country home.",
