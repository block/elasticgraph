    window.store["/docs/v0.19.1.1/ElasticGraph/Apollo/SchemaDefinition/FieldExtension.html"] = {
        "title": "API Documentation - Module: ElasticGraph::Apollo::SchemaDefinition::FieldExtension",
        "content": "Index (F) » ElasticGraph » Apollo » SchemaDefinition » FieldExtension Module: ElasticGraph::Apollo::SchemaDefinition::FieldExtension Includes: ApolloDirectives::Authenticated, ApolloDirectives::External, ApolloDirectives::Inaccessible, ApolloDirectives::Override, ApolloDirectives::Policy, ApolloDirectives::Provides, ApolloDirectives::Requires, ApolloDirectives::RequiresScopes, ApolloDirectives::Shareable, ApolloDirectives::Tag elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/field_extension.rb Extends SchemaDefinition::SchemaElements::Field to offer Apollo field directives. Class Method Summary collapse .tagged_with?(element, tag_name) ⇒ Boolean Helper method that indicates if the given schema element has a specific tag. Instance Method Summary collapse #tag_with(tag_name) ⇒ void Extension method designed to support Apollo’s contract variant tagging. Methods included from ApolloDirectives::Tag #apollo_tag Methods included from ApolloDirectives::Shareable #apollo_shareable Methods included from ApolloDirectives::RequiresScopes #apollo_requires_scopes Methods included from ApolloDirectives::Requires #apollo_requires Methods included from ApolloDirectives::Provides #apollo_provides Methods included from ApolloDirectives::Policy #apollo_policy Methods included from ApolloDirectives::Override #apollo_override Methods included from ApolloDirectives::Inaccessible #apollo_inaccessible Methods included from ApolloDirectives::External #apollo_external Methods included from ApolloDirectives::Authenticated #apollo_authenticated Class Method Details .tagged_with?(element, tag_name) ⇒ Boolean Helper method that indicates if the given schema element has a specific tag. Parameters: element (Object) — element to check tag_name (String) — tag to check (Boolean) Instance Method Details #tag_with(tag_name) ⇒ void This method returns an undefined value.Extension method designed to support Apollo’s contract variant tagging. Calling this method on a field will cause the field and every schema element derived from the field (e.g. the filter field, he aggregation field, etc), to be tagged with the given tag_name, ensuring that all capabilities related to the field are available in the contract variant. Examples: Tag a field (and its derived elements) with “public” ElasticGraph.define_schema do |schema| schema.object_type \"Campaign\" do |t| t.field \"name\", \"String\" do |f| f.tag_with \"public\" end end end Parameters: tag_name (String) — tag to add to schema elements generated for this field See Also: ApolloDirectives::Tag APIExtension#tag_built_in_types_with Helper method that indicates if the given schema element has a specific tag. This method returns an undefined value.Extension method designed to support Apollo’s contract variant tagging. Calling this method on a field will cause the field and every schema element derived from the field (e.g. the filter field, he aggregation field, etc), to be tagged with the given tag_name, ensuring that all capabilities related to the field are available in the contract variant.",

        "title": "API Documentation - Module: ElasticGraph::Apollo",
        "content": "Index (A) » ElasticGraph » Apollo Module: ElasticGraph::Apollo elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/api_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/graphql/engine_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/graphql/service_field_resolver.rb, elasticgraph-apollo/lib/elastic_graph/apollo/graphql/entities_field_resolver.rb, elasticgraph-apollo/lib/elastic_graph/apollo/graphql/http_endpoint_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/field_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/state_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/apollo_directives.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/factory_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/argument_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/enum_type_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/enum_value_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/input_type_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/union_type_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/entity_type_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/object_type_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/scalar_type_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/interface_type_extension.rb, elasticgraph-apollo/lib/elastic_graph/apollo/schema_definition/graphql_sdl_enumerator_extension.rb ElasticGraph extension library that implements the Apollo subgraph federation spec, turning any ElasticGraph instance into an Apollo subgraph. ElasticGraph::Apollo has two parts: SchemaDefinition is an extension used while defining an ElasticGraph schema. It includes all schema elements that are part of the Apollo spec, including _Entity and the various directives. GraphQL is an extension used by elasticgraph-graphql to support queries against Apollo’s subgraph schema additions (e.g. _service and _entities). It includes reference resolvers for all indexed types in your schema. To use elasticgraph-apollo, simply use SchemaDefinition::APIExtension as a schema definition extension module. The GraphQL extension module will get used by elasticgraph-graphql automatically. Examples: Use elasticgraph-apollo in a project require \"elastic_graph/apollo/schema_definition/api_extension\" ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.schema_definition_extension_modules = [ElasticGraph::Apollo::SchemaDefinition::APIExtension] end Defined Under Namespace Modules: GraphQL, SchemaDefinition",

    window.store["/docs/v0.19.1.1/ElasticGraph/JSONSchema/ValidatorFactory.html"] = {
        "title": "API Documentation - Class: ElasticGraph::JSONSchema::ValidatorFactory",
        "content": "Index (V) » ElasticGraph » JSONSchema » ValidatorFactory Class: ElasticGraph::JSONSchema::ValidatorFactory Inherits: Object Object ElasticGraph::JSONSchema::ValidatorFactory show all elasticgraph-json_schema/lib/elastic_graph/json_schema/validator_factory.rb Factory class responsible for creating Validators for particular ElasticGraph types. Instance Method Summary collapse #initialize(schema:, sanitize_pii:) ⇒ ValidatorFactory constructor A new instance of ValidatorFactory. #validator_for(type_name) ⇒ Validator Gets the Validator for a particular ElasticGraph type. #with_unknown_properties_disallowed(except: []) ⇒ ValidatorFactory Returns a new factory configured to disallow unknown properties. Constructor Details #initialize(schema:, sanitize_pii:) ⇒ ValidatorFactory Returns a new instance of ValidatorFactory. Parameters: schema (Hash<String, Object>) — the JSON schema for an entire ElasticGraph schema sanitize_pii (Boolean) — whether to omit data that may contain PII from error messages Instance Method Details #validator_for(type_name) ⇒ Validator Gets the ElasticGraph::JSONSchema::Validator for a particular ElasticGraph type. Parameters: type_name (String) — name of an ElasticGraph type (Validator) #with_unknown_properties_disallowed(except: []) ⇒ ValidatorFactory Returns a new factory configured to disallow unknown properties. By default, JSON schema allows unknown properties (they’ll simply be ignored when validating a JSON document). It can be useful to validate more strictly, so that a document with properties not defined in the JSON schema gets validation errors. Parameters: except (Array<String>) (defaults to: []) — paths under which unknown properties should still be allowed (ValidatorFactory) Returns a new instance of ValidatorFactory. Gets the ElasticGraph::JSONSchema::Validator for a particular ElasticGraph type. Returns a new factory configured to disallow unknown properties. By default, JSON schema allows unknown properties (they’     window.store["/docs/v0.19.1.1/ElasticGraph/Local/RakeTasks.html"] = {
        "title": "API Documentation - Class: ElasticGraph::Local::RakeTasks",
        "content": "Index (R) » ElasticGraph » Local » RakeTasks Class: ElasticGraph::Local::RakeTasks Inherits: Rake::TaskLib Object Rake::TaskLib ElasticGraph::Local::RakeTasks show all elasticgraph-local/lib/elastic_graph/local/rake_tasks.rb Note: All tasks (besides the schema_artifacts tasks) require docker and docker-compose to be available on your machine. Defines tasks for local development. These tasks include: Running OpenSearch and/or Elasticsearch locally ((elasticsearch|opensearch):[env]:(boot|daemon|halt)) Managing schema artifacts (schema_artifacts:(check|dump)) Configuring OpenSearch/Elasticsearch locally (clusters:configure:(dry_run|perform)) Indexing fake data (index_fake_data:[type]) Booting an ElasticGraph application locally (boot_locally) Constant Summary collapse UI_PORT_OFFSET = Offset we add to a port number for the UI (e.g. Kibana or OpenSearch Dashboards). Example: if Elasticsearch/OpenSearch is running on port 9876, the UI for it will run on port 19876. 10_000 Instance Attribute Summary collapse #daemon_timeout ⇒ Integer Maximum time (in seconds) to wait for the datastore to boot when booting it as a daemon. #derived_type_name_formats ⇒ Object Overrides for the naming formats used by ElasticGraph for derived GraphQL type names. #elasticsearch_versions ⇒ Array<String> List of Elasticsearch versions you want to be able to boot. #enforce_json_schema_version ⇒ Boolean Whether or not to enforce the requirement that the JSON schema version is incremented every time dumping the JSON schemas results in a changed artifact. #enum_value_overrides_by_type ⇒ Hash<Symbol, Hash<Symbol, String>> Overrides for the names of specific GraphQL enum values for specific enum types. #env_port_mapping ⇒ Hash<Symbol, Integer> Hash mapping environments (e.g. :test, :dev, etc) to port numbers for use when booting Elasticsearch or OpenSearch. #index_document_sizes ⇒ Boolean When enabled, ElasticGraph will configure the index mappings so that the datastore indexes a _size field in each index document. #opensearch_versions ⇒ Array<String> List of OpenSearch versions you want to be able to boot. #output ⇒ IO IO for printing output (defaults to stdout). #schema_definition_extension_modules ⇒ Array<Module> List of Ruby modules to extend onto the SchemaDefinition::API instance. #schema_element_name_form ⇒ :camelCase, :snake_case The form of names for schema elements (fields, arguments, directives) generated by ElasticGraph, either :snake_case or :camelCase. #schema_element_name_overrides ⇒ Hash<Symbol, String> Overrides for specific names of schema elements (fields, arguments, directives) generated by ElasticGraph. #type_name_overrides ⇒ Hash<Symbol, String> Overrides for the names of specific GraphQL types. Instance Method Summary collapse #define_fake_data_batch_for(type) {|Array<Hash<String, Object>>, Array<Hash<Symbol, Object>>| ... } ⇒ Object Register a callback for use when indexing a batch fake data. #initialize(local_config_yaml:, path_to_schema:) {|RakeTasks| ... } ⇒ RakeTasks constructor A new instance of RakeTasks. Constructor Details #initialize(local_config_yaml:, path_to_schema:) {|RakeTasks| ... } ⇒ RakeTasks Note: This method uses keyword args for all required arguments. Optional task settings are instead specified using the block. Returns a new instance of RakeTasks. Parameters: local_config_yaml (String, Pathname) — path to the settings YAML file for the local/development environment path_to_schema (String, Pathname) — path to the Ruby schema definition file–either the only file that defines the schema (using ElasticGraph.define_schema) or the “main” schema definition file, which loads other files which further define parts of the schema. Yields: (RakeTasks) — instance for further configuration Yield (void) Instance Attribute Details #daemon_timeout ⇒ Integer Maximum time (in seconds) to wait for the datastore to boot when booting it as a daemon. Defaults to 120. (Integer) — maximum time in seconds to wait when booting Elasticsearch/OpenSearch as a daemon #derived_type_name_formats ⇒ Object Overrides for the naming formats used by ElasticGraph for derived GraphQL type names. For example, to use Metrics instead of AggregatedValues as the suffix for the generated types supporting getting aggregated metrid values, set to {AggregatedValues: \"%{base}Metrics\"}. See SchemaDefinition::SchemaElements::TypeNamer::DEFAULT_FORMATS for the available formats. Defaults to an empty hash. Examples: Change the AggregatedValues type suffix to Metrics ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.derived_type_name_formats = {AggregatedValues: \"%{base}Metrics\"} end #elasticsearch_versions ⇒ Array<String> List of Elasticsearch versions you want to be able to boot. Rake tasks will be defined for each version to support booting and halting Elasticsearch locally. If the configuration of local_config_yaml only configures opensearch as a cluster backend, will default to an empty array. Otherwise, defaults to the versions of Elasticsearch that are exercised by the ElasticGraph test suite, as defined by lib/elastic_graph/local/tested_datastore_versions.yaml: # This file determines the versions the ElasticGraph CI build tests against, and is also# used to provide the default versions offered by the `elasticgraph-local` rake tasks.elasticsearch:- 8.16.1 # latest version as of 2024-12-08.opensearch:- 2.18.0 # latest version as of 2024-12-08.- 2.7.0 # lowest version ElasticGraph currently supports Examples: Configure the Elasticsearch versions available to boot locally ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.elasticsearch_versions = [\"8.16.1\"] end (Array<String>) — list of Elasticsearch versions See Also: #opensearch_versions #enforce_json_schema_version ⇒ Boolean Note: Generally speaking, you will want this to be true for any ElasticGraph application that is in production as the versioning of JSON schemas is what supports safe schema evolution as it allows ElasticGraph to identify which version of the JSON schema the publishing system was operating on when it published an event. It can be useful to set it to false before your application is in production, as you do not want to be forced to bump the version after every single schema change while you are building an initial prototype. Whether or not to enforce the requirement that the JSON schema version is incremented every time dumping the JSON schemas results in a changed artifact. Defaults to true. Examples: Disable enforcement during initial prototyping ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| # TODO: remove this once we're past the prototyping stage tasks.enforce_json_schema_version = false end (Boolean) — whether to require json_schema_version to be incremented on changes that impact json_schemas.yaml See Also: SchemaDefinition::API#json_schema_version #enum_value_overrides_by_type ⇒ Hash<Symbol, Hash<Symbol, String>> Overrides for the names of specific GraphQL enum values for specific enum types. For example, to rename the DayOfWeek.MONDAY enum to DayOfWeek.MON, set to {DayOfWeek: {MONDAY: \"MON\"}}. Defaults to an empty hash. Examples: Shorten the names of the DayOfWeek enum values ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.enum_value_overrides_by_type = { DayOfWeek: { MONDAY: \"MON\", TUESDAY: \"TUE\", WEDNESDAY: \"WED\", THURSDAY: \"THU\", FRIDAY: \"FRI\", SATURDAY: \"SAT\", SUNDAY: \"SUN\" } } end (Hash<Symbol, Hash<Symbol, String>>) — overrides for the names of specific enum values for specific enum types #env_port_mapping ⇒ Hash<Symbol, Integer> Note: When booting Elasticsearch/OpenSearch, Kibana (or its OpenSearch equivalent, “OpenSearch Dashboards”) will also get booted, selecting the port by adding 10000 to the configured port. Hash mapping environments (e.g. :test, :dev, etc) to port numbers for use when booting Elasticsearch or OpenSearch. The hash automatically includes an entry for the :local environment, using a port number extracted from local_config_yaml. Examples: Define what port to use to boot the datastore for the :test environment ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.env_port_mapping = {test: 9999} end (Hash<Symbol, Integer>) — mapping from environment name to port number #index_document_sizes ⇒ Boolean Note: Enabling this requires the mapper-size plugin to be installed on your datastore cluster. You are responsible for ensuring that is installed if you enable this feature. If you enable this and the plugin is not installed, you will get errors! When enabled, ElasticGraph will configure the index mappings so that the datastore indexes a _size field in each index document. ElasticGraph itself does not do anything with this field, but it will be available for your use in any direct queries (e.g. via Kibana). Defaults to false since it requires a plugin. Examples: Enable indexing document sizes ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.index_document_sizes = true end (Boolean) — whether or not the _size field should be indexed on each indexed type #opensearch_versions ⇒ Array<String> List of OpenSearch versions you want to be able to boot. Rake tasks will be defined for each version to support booting and halting OpenSearch locally. If the configuration of local_config_yaml only configures elasticsearch as a cluster backend, will default to an empty array. Otherwise, defaults to the versions of OpenSearch that are exercised by the ElasticGraph test suite, as defined by lib/elastic_graph/local/tested_datastore_versions.yaml: # This file determines the versions the ElasticGraph CI build tests against, and is also# used to provide the default versions offered by the `elasticgraph-local` rake tasks.elasticsearch:- 8.16.1 # latest version as of 2024-12-08.opensearch:- 2.18.0 # latest version as of 2024-12-08.- 2.7.0 # lowest version ElasticGraph currently supports Examples: Configure the OpenSearch versions available to boot locally ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.opensearch_versions = [\"2.18.0\"] end (Array<String>) — list of OpenSearch versions See Also: #elasticsearch_versions #output ⇒ IO IO for printing output (defaults to stdout). (IO) — IO object used for printing output. #schema_definition_extension_modules ⇒ Array<Module> List of Ruby modules to extend onto the SchemaDefinition::API instance. Designed to support ElasticGraph extensions (such as Apollo::SchemaDefinition::APIExtension). Defaults to an empty list. Examples: Use elasticgraph-apollo require \"elastic_graph/apollo/schema_definition/api_extension\" ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.schema_definition_extension_modules = [ElasticGraph::Apollo::SchemaDefinition::APIExtension] end Extension that defines a @since directive and offers a since API on fields module SinceExtension # `self.extended` is a standard Ruby hook that gets called when a module is extended onto an object. # The argument is the object the module was extended onto (a `SchemaDefinition::API` instance in this case). def self.extended(api) # Define our `@since` directive api.raw_sdl \"directive @since(date: Date!) on FIELD_DEFINITION\" # In order to hook into fields, extend the `SchemaDefinition::Factory` with a module. The factory is used # for creation of all schema definition objects. api.factory.extend FactoryExtension end module FactoryExtension # Hook into the creation of all `SchemaDefinition::Field` objects so that we can extend each field # instance with our `FieldExtension` module. def new_field(*args, **options) super(*args, **options) do |field| field.extend FieldExtension yield field if block_given? end end end # Offer a `f.since date` API on fields. module FieldExtension def since(date) directive \"since\", date: date end end end ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.schema_definition_extension_modules = [SinceExtension] end (Array<Module>) — list of extension modules #schema_element_name_form ⇒ :camelCase, :snake_case The form of names for schema elements (fields, arguments, directives) generated by ElasticGraph, either :snake_case or :camelCase. For example, if set to :camelCase, ElasticGraph will generate a groupedBy field, but if set to :snake_case, ElasticGraph will generate a grouped_by field. Defaults to :camelCase since most GraphQL schemas use that casing. Examples: Use snake_case names instead of camelCase ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.schema_element_name_form = :snake_case end (:camelCase, :snake_case) — which form to use #schema_element_name_overrides ⇒ Hash<Symbol, String> Overrides for specific names of schema elements (fields, arguments, directives) generated by ElasticGraph. For example, to rename the gt filter field to greaterThan, set to {gt: \"greaterThan\"}. Defaults to an empty hash. Examples: Spell out comparison operators instead of using shortened forms ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.schema_element_name_overrides = { gt: \"greaterThan\", gte: \"greaterThanOrEqualTo\", lt: \"lessThan\", lte: \"lessThanOrEqualTo\" } end (Hash<Symbol, String>) — overrides for specific field, argument, or directive names #type_name_overrides ⇒ Hash<Symbol, String> Overrides for the names of specific GraphQL types. For example, to rename the JsonSafeLong scalar to BigInt, set to {JsonSafeLong: \"BigInt}. Defaults to an empty hash. Examples: Rename JsonSafeLong to BigInt ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.type_name_overrides = {JsonSafeLong: \"BigInt\"} end (Hash<Symbol, String>) — overrides for specific type names Instance Method Details #define_fake_data_batch_for(type) {|Array<Hash<String, Object>>, Array<Hash<Symbol, Object>>| ... } ⇒ Object Register a callback for use when indexing a batch fake data. An index_fake_data:[type] rake task will be generated for each registered callback. Examples: Register a callback to generate fake campaigns data ElasticGraph::Local::RakeTasks.new( local_config_yaml: \"config/settings/local.yaml\", path_to_schema: \"config/schema.rb\" ) do |tasks| tasks.define_fake_data_batch_for :campaigns do FactoryBot.build_list(:campaigns) end end Parameters: type (Symbol) — type of data batch. Can be the name of a GraphQL type or any other name you want to give a batch of fake data Yields: (Array<Hash<String, Object>>, Array<Hash<Symbol, Object>>) — list the block should append to when generating data Yield (void) Note: This method uses keyword args for all required arguments. Optional task settings are instead specified using the block. Returns a new instance of RakeTasks. Maximum time (in seconds) to wait for the datastore to boot when booting it as a daemon. Defaults to 120. Overrides for the naming formats used by ElasticGraph for derived GraphQL type names. For example, to use Metrics instead of AggregatedValues as the suffix for the generated types supporting getting aggregated metrid values, set to {AggregatedValues: \"%{base}         "title": "API Documentation - Class: ElasticGraph::Rack::GraphQLEndpoint",
        "content": "Index (G) » ElasticGraph » Rack » GraphQLEndpoint Class: ElasticGraph::Rack::GraphQLEndpoint Inherits: Object Object ElasticGraph::Rack::GraphQLEndpoint show all elasticgraph-rack/lib/elastic_graph/rack/graphql_endpoint.rb A simple Rack wrapper around an ElasticGraph GraphQL endpoint. This can be used for local development, mounted in a Rails application, or run in any other Rack-compatible context. Examples: Simple config.ru to run an ElasticGraph endpoint as a Rack application require \"elastic_graph/graphql\" require \"elastic_graph/rack/graphql_endpoint\" graphql = ElasticGraph::GraphQL.from_yaml_file(\"config/settings/development.yaml\") run ElasticGraph::Rack::GraphQLEndpoint.new(graphql) Instance Method Summary collapse #call(env) ⇒ Array(Integer, Hash<String, String>, Array<String>) Responds to a Rack request. #initialize(graphql) ⇒ GraphQLEndpoint constructor A new instance of GraphQLEndpoint. Constructor Details #initialize(graphql) ⇒ GraphQLEndpoint Returns a new instance of GraphQLEndpoint. Parameters: graphql (ElasticGraph::GraphQL) — ElasticGraph GraphQL instance Instance Method Details #call(env) ⇒ Array(Integer, Hash<String, String>, Array<String>) Responds to a Rack request. Parameters: env (Hash<String, Object>) — Rack env (Array(Integer, Hash<String, String>, Array<String>)) Returns a new instance of GraphQLEndpoint. Responds to a Rack request.",

    window.store["/docs/v0.19.1.1/ElasticGraph/SchemaDefinition/API.html"] = {
        "title": "API Documentation - Class: ElasticGraph::SchemaDefinition::API",
        "content": "Index (A) » ElasticGraph » SchemaDefinition » API Class: ElasticGraph::SchemaDefinition::API Inherits: Object Object ElasticGraph::SchemaDefinition::API show all elasticgraph-schema_definition/lib/elastic_graph/schema_definition/api.rb Root API object that provides the schema definition API. Examples: ElasticGraph.define_schema do |schema| # The `schema` object is an instance of `API` end Instance Attribute Summary collapse #factory ⇒ Factory readonly Object responsible for instantiating all schema element classes. #state ⇒ State readonly Object which holds all state for the schema definition. Instance Method Summary collapse #deleted_type(name) ⇒ void Registers the name of a type that existed in a prior version of the schema but has been deleted. #enum_type(name) {|SchemaElements::EnumType| ... } ⇒ void Defines a GraphQL enum type. #interface_type(name) {|SchemaElements::InterfaceType| ... } ⇒ void Defines a GraphQL interface. #json_schema_version(version) ⇒ void Defines the version number of the current JSON schema. #object_type(name) {|SchemaElements::ObjectType| ... } ⇒ void Defines a GraphQL object type Use it to define a concrete type that has subfields. #on_built_in_types {|SchemaElements::EnumType, SchemaElements::InputType, SchemaElements::InterfaceType, SchemaElements::ObjectType, SchemaElements::ScalarType, SchemaElements::UnionType| ... } ⇒ void Registers a customization callback that will be applied to every built-in type automatically provided by ElasticGraph. #raw_sdl(string) ⇒ void Defines a raw GraphQL SDL snippet that will be included in the generated schema.graphql artifact. #register_graphql_extension(extension_module, defined_at:, **extension_config) ⇒ void Registers a GraphQL extension module that will be loaded and used by elasticgraph-graphql. #results ⇒ Object The results of the schema definition. #scalar_type(name) {|SchemaElements::ScalarType| ... } ⇒ void Defines a GraphQL scalar type. #union_type(name) {|SchemaElements::UnionType| ... } ⇒ void Defines a GraphQL union type. Instance Attribute Details #factory ⇒ Factory (readonly) Returns object responsible for instantiating all schema element classes. (Factory) — object responsible for instantiating all schema element classes #state ⇒ State (readonly) Returns object which holds all state for the schema definition. (State) — object which holds all state for the schema definition Instance Method Details #deleted_type(name) ⇒ void Note: In situations where this API applies, ElasticGraph will give you an error message indicating that you need to use this API or SchemaElements::TypeWithSubfields#renamed_from. Likewise, when ElasticGraph no longer needs to know about this, it’ll give you a warning indicating the call to this method can be removed. This method returns an undefined value.Registers the name of a type that existed in a prior version of the schema but has been deleted. Examples: Indicate that Widget has been deleted ElasticGraph.define_schema do |schema| schema.deleted_type \"Widget\" end Parameters: name (String) — name of type that used to exist but has been deleted #enum_type(name) {|SchemaElements::EnumType| ... } ⇒ void This method returns an undefined value.Defines a GraphQL enum type. The type is restricted to an enumerated set of values, each with a unique name. Use value or values to define the enum values in the passed block. Note: if required by your configuration, this may generate a pair of Enum types (an input enum and an output enum). Examples: Define an enum type ElasticGraph.define_schema do |schema| schema.enum_type \"Currency\" do |t| t.value \"USD\" do |v| v.documentation \"US Dollars.\" end t.value \"JPY\" do |v| v.documentation \"Japanese Yen.\" end # You can define multiple values in one call if you don't care about their docs or directives. t.values \"GBP\", \"AUD\" end end Parameters: name (String) — name of the enum type Yields: (SchemaElements::EnumType) — enum type object #interface_type(name) {|SchemaElements::InterfaceType| ... } ⇒ void This method returns an undefined value.Defines a GraphQL interface. Use it to define an abstract supertype with one or more fields that concrete implementations of the interface must also define. Each implementation can be an SchemaElements::ObjectType or SchemaElements::InterfaceType. Examples: Define an interface and implement it ElasticGraph.define_schema do |schema| schema.interface_type \"Athlete\" do |t| t.field \"name\", \"String\" t.field \"team\", \"String\" end schema.object_type \"BaseballPlayer\" do |t| t.implements \"Athlete\" t.field \"name\", \"String\" t.field \"team\", \"String\" t.field \"battingAvg\", \"Float\" end schema.object_type \"BasketballPlayer\" do |t| t.implements \"Athlete\" t.field \"name\", \"String\" t.field \"team\", \"String\" t.field \"pointsPerGame\", \"Float\" end end Parameters: name (String) — name of the interface Yields: (SchemaElements::InterfaceType) — interface type object #json_schema_version(version) ⇒ void Note: While this is an important part of how ElasticGraph is designed to support schema evolution, it can be annoying constantly have to increment this while rapidly changing the schema during prototyping. You can disable the requirement to increment this on every JSON schema change by setting enforce_json_schema_version to false in your Rakefile. This method returns an undefined value.Defines the version number of the current JSON schema. Importantly, every time a change is made that impacts the JSON schema artifact, the version number must be incremented to ensure that each different version of the JSON schema is identified by a unique version number. The publisher will then include this version number in published events to identify the version of the schema it was using. This avoids the need to deploy the publisher and ElasticGraph indexer at the same time to keep them in sync. Examples: Set the JSON schema version to 1 ElasticGraph.define_schema do |schema| schema.json_schema_version 1 end Parameters: version (Integer) — current version number of the JSON schema artifact See Also: Local::RakeTasks#enforce_json_schema_version #object_type(name) {|SchemaElements::ObjectType| ... } ⇒ void This method returns an undefined value.Defines a GraphQL object type Use it to define a concrete type that has subfields. Object types can either be indexed (e.g. directly indexed in the datastore, and available to query from the root Query object) or embedded in other indexed types. Examples: Define embedded and indexed object types ElasticGraph.define_schema do |schema| # `Money` is an embedded object type schema.object_type \"Money\" do |t| t.field \"currency\", \"String\" t.field \"amount\", \"JsonSafeLong\" end # `Transaction` is an indexed object type schema.object_type \"Transaction\" do |t| t.root_query_fields plural: \"transactions\" t.field \"id\", \"ID\" t.field \"cost\", \"Money\" t.index \"transactions\" end end Parameters: name (String) — name of the object type Yields: (SchemaElements::ObjectType) — object type object #on_built_in_types {|SchemaElements::EnumType, SchemaElements::InputType, SchemaElements::InterfaceType, SchemaElements::ObjectType, SchemaElements::ScalarType, SchemaElements::UnionType| ... } ⇒ void This method returns an undefined value.Registers a customization callback that will be applied to every built-in type automatically provided by ElasticGraph. Provides an opportunity to customize the built-in types (e.g. to add directives to them or whatever). Examples: Customize documentation of built-in types ElasticGraph.define_schema do |schema| schema.on_built_in_types do |type| type.append_to_documentation \"This is a built-in ElasticGraph type.\" end end Yields: (SchemaElements::EnumType, SchemaElements::InputType, SchemaElements::InterfaceType, SchemaElements::ObjectType, SchemaElements::ScalarType, SchemaElements::UnionType) — built in type #raw_sdl(string) ⇒ void This method returns an undefined value.Defines a raw GraphQL SDL snippet that will be included in the generated schema.graphql artifact. Designed to be an escape hatch, for when ElasticGraph doesn’t provide another way to write some type of GraphQL SDL element that you need. Currently, the only known use case is to define custom GraphQL directives. Examples: Define a custom directive and use it ElasticGraph.define_schema do |schema| # Define a directive we can use to annotate what system a data type comes from. schema.raw_sdl \"directive @sourcedFrom(system: String!) on OBJECT\" schema.object_type \"Transaction\" do |t| t.directive \"sourcedFrom\", system: \"transaction-processor\" end end Parameters: string (String) — Raw snippet of SDL #register_graphql_extension(extension_module, defined_at:, **extension_config) ⇒ void This method returns an undefined value.Registers a GraphQL extension module that will be loaded and used by elasticgraph-graphql. While such extension modules can also be configured in a settings YAML file, it can be useful to register it here when you want to ensure that the extension is used in all environments. For example, an extension library that defines custom schema elements (such as elasticgraph-apollo) may need to ensure its corresponding GraphQL extension module is used since the custom schema elements would not work correctly otherwise. Examples: Register elasticgraph-query_registry extension module require(query_registry_require_path = \"elastic_graph/query_registry/graphql_extension\") ElasticGraph.define_schema do |schema| schema.register_graphql_extension ElasticGraph::QueryRegistry::GraphQLExtension, defined_at: query_registry_require_path end Parameters: extension_module (Module) — GraphQL extension module defined_at (String) — the require path of the extension module extension_config (Hash<Symbol, Object>) — configuration options for the extension module #results ⇒ Object Returns the results of the schema definition. the results of the schema definition #scalar_type(name) {|SchemaElements::ScalarType| ... } ⇒ void This method returns an undefined value.Defines a GraphQL scalar type. ElasticGraph itself uses this to define a few common scalar types (e.g. Date and DateTime), but it is also available to you to use to define your own custom scalar types. Examples: Define a scalar type ElasticGraph.define_schema do |schema| schema.scalar_type \"URL\" do |t| t.mapping type: \"keyword\" t.json_schema type: \"string\", format: \"uri\" end end Parameters: name (String) — name of the scalar type Yields: (SchemaElements::ScalarType) — scalar type object #union_type(name) {|SchemaElements::UnionType| ... } ⇒ void This method returns an undefined value.Defines a GraphQL union type. Use it to define an abstract supertype with one or more concrete subtypes. Each subtype must be an SchemaElements::ObjectType, but they do not have to share any fields in common. Examples: Define a union type ElasticGraph.define_schema do |schema| schema.object_type \"Card\" do |t| # ... end schema.object_type \"BankAccount\" do |t| # ... end schema.object_type \"BitcoinWallet\" do |t| # ... end schema.union_type \"FundingSource\" do |t| t.subtype \"Card\" t.subtypes \"BankAccount\", \"BitcoinWallet\" end end Parameters: name (String) — name of the union type Yields: (SchemaElements::UnionType) — union type object Returns object responsible for instantiating all schema element classes. Returns object which holds all state for the schema definition. Note: In situations where this API applies, ElasticGraph will give you an error message indicating that you need to use this API or SchemaElements::TypeWithSubfields#renamed_from. Likewise, when ElasticGraph no longer needs to know about this, it’ll give you a warning indicating the call to this method can be removed. This method returns an undefined value.Registers the name of a type that existed in a prior version of the schema but has been deleted. This method returns an undefined value.Defines a GraphQL enum type. The type is r     window.store["/docs/v0.19.1.1/ElasticGraph/SchemaDefinition/Indexing/DerivedIndexedType.html"] = {
        "title": "API Documentation - Class: ElasticGraph::SchemaDefinition::Indexing::DerivedIndexedType",
        "content": "Index (D) » ElasticGraph » SchemaDefinition » Indexing » DerivedIndexedType Class: ElasticGraph::SchemaDefinition::Indexing::DerivedIndexedType Inherits: Object Object ElasticGraph::SchemaDefinition::Indexing::DerivedIndexedType show all elasticgraph-schema_definition/lib/elastic_graph/schema_definition/indexing/derived_indexed_type.rb Used to configure the derivation of a derived indexed type from a source type. This type is yielded from Mixins::HasIndices#derive_indexed_type_fields. Examples: Derive a Course type from StudentCourseEnrollment events ElasticGraph.define_schema do |schema| # `StudentCourseEnrollment` is a directly indexed type. schema.object_type \"StudentCourseEnrollment\" do |t| t.field \"id\", \"ID\" t.field \"courseId\", \"ID\" t.field \"courseName\", \"String\" t.field \"studentName\", \"String\" t.field \"courseStartDate\", \"Date\" t.index \"student_course_enrollments\" # Here we define how the `Course` indexed type is derived when we index `StudentCourseEnrollment` events. t.derive_indexed_type_fields \"Course\", from_id: \"courseId\" do |derive| # `derive` is an instance of `DerivedIndexedType`. derive.immutable_value \"name\", from: \"courseName\" derive.append_only_set \"students\", from: \"studentName\" derive.min_value \"firstOfferedDate\", from: \"courseStartDate\" derive.max_value \"mostRecentlyOfferedDate\", from: \"courseStartDate\" end end # `Course` is an indexed type that is derived entirely from `StudentCourseEnrollment` events. schema.object_type \"Course\" do |t| t.field \"id\", \"ID\" t.field \"name\", \"String\" t.field \"students\", \"[String!]!\" t.field \"firstOfferedDate\", \"Date\" t.field \"mostRecentlyOfferedDate\", \"Date\" t.index \"courses\" end end Instance Attribute Summary collapse #fields ⇒ Array<DerivedFields::AppendOnlySet, DerivedFields::ImmutableValue, DerivedFields::MinOrMaxValue> Derived field definitions. #id_source ⇒ String Path to field on the source type used as id on the derived type. #rollover_timestamp_value_source ⇒ String? Path to field on the source type used as the timestamp field for rollover. #routing_value_source ⇒ String? Path to field on the source type used for shard routing. #source_type ⇒ SchemaElements::ObjectType The type used as a source for this derive type. Instance Method Summary collapse #append_only_set(field_name, from:) ⇒ DerivedIndexedType::AppendOnlySet Configures field_name (on the derived indexing type) to contain the set union of all values from the from field on the source type. #immutable_value(field_name, from:, nullable: true, can_change_from_null: false) ⇒ DerivedFields::ImmutableValue Configures field_name (on the derived indexing type) to contain a single immutable value from the from field on the source type. #initialize(source_type:, destination_type_ref:, id_source:, routing_value_source:, rollover_timestamp_value_source:) {|DerivedIndexedType| ... } ⇒ DerivedIndexedType constructor private A new instance of DerivedIndexedType. #max_value(field_name, from:) ⇒ DerivedIndexedType::MinOrMaxValue Configures field_name (on the derived indexing type) to contain the maximum of all values from the from field on the source type. #min_value(field_name, from:) ⇒ DerivedIndexedType::MinOrMaxValue Configures field_name (on the derived indexing type) to contain the minimum of all values from the from field on the source type. #painless_script ⇒ Scripting::Script private Painless script that will maintain the derived fields. #runtime_metadata_for_source_type ⇒ SchemaArtifacts::RuntimeMetadata::UpdateTarget private Runtime metadata for the source type. Constructor Details #initialize(source_type:, destination_type_ref:, id_source:, routing_value_source:, rollover_timestamp_value_source:) {|DerivedIndexedType| ... } ⇒ DerivedIndexedType Returns a new instance of DerivedIndexedType. Parameters: source_type (SchemaElements::ObjectType) — the type used as a source for this derive type destination_type_ref (SchemaElements::TypeReference) — the derived type id_source (String) — path to field on the source type used as id on the derived type routing_value_source (String, nil) — path to field on the source type used for shard routing rollover_timestamp_value_source (String, nil) — path to field on the source type used as the timestamp field for rollover Yields: (DerivedIndexedType) — the DerivedIndexedType instance Instance Attribute Details #fields ⇒ Array<DerivedFields::AppendOnlySet, DerivedFields::ImmutableValue, DerivedFields::MinOrMaxValue> Returns derived field definitions. (Array<DerivedFields::AppendOnlySet, DerivedFields::ImmutableValue, DerivedFields::MinOrMaxValue>) — derived field definitions #id_source ⇒ String Returns path to field on the source type used as id on the derived type. (String) — path to field on the source type used as id on the derived type #rollover_timestamp_value_source ⇒ String? Returns path to field on the source type used as the timestamp field for rollover. (String, nil) — path to field on the source type used as the timestamp field for rollover #routing_value_source ⇒ String? Returns path to field on the source type used for shard routing. (String, nil) — path to field on the source type used for shard routing #source_type ⇒ SchemaElements::ObjectType Returns the type used as a source for this derive type. (SchemaElements::ObjectType) — the type used as a source for this derive type Instance Method Details #append_only_set(field_name, from:) ⇒ DerivedIndexedType::AppendOnlySet Configures field_name (on the derived indexing type) to contain the set union of all values from the from field on the source type. Values are only ever appended to the set, so the field will act as an append-only set. Examples: ElasticGraph.define_schema do |schema| schema.object_type \"StudentCourseEnrollment\" do |t| t.field \"id\", \"ID\" t.field \"courseId\", \"ID\" t.field \"studentName\", \"String\" t.index \"student_course_enrollments\" t.derive_indexed_type_fields \"Course\", from_id: \"courseId\" do |derive| derive.append_only_set \"students\", from: \"studentName\" end end schema.object_type \"Course\" do |t| t.field \"id\", \"ID\" t.field \"students\", \"[String!]!\" t.index \"courses\" end end Parameters: field_name (String) — name of field on the derived indexing type to store the derived set from (String) — path to field on the source type to source values from (DerivedIndexedType::AppendOnlySet) #immutable_value(field_name, from:, nullable: true, can_change_from_null: false) ⇒ DerivedFields::ImmutableValue Configures field_name (on the derived indexing type) to contain a single immutable value from the from field on the source type. Immutability is enforced by triggering an indexing failure with a clear error if any event’s source value is different from the value already indexed on this field. Examples: ElasticGraph.define_schema do |schema| schema.object_type \"StudentCourseEnrollment\" do |t| t.field \"id\", \"ID\" t.field \"courseId\", \"ID\" t.field \"courseName\", \"String\" t.index \"student_course_enrollments\" t.derive_indexed_type_fields \"Course\", from_id: \"courseId\" do |derive| derive.immutable_value \"name\", from: \"courseName\" end end schema.object_type \"Course\" do |t| t.field \"id\", \"ID\" t.field \"name\", \"String\" t.index \"courses\" end end Parameters: field_name (String) — name of field on the derived indexing type to store the derived value from (String) — path to field on the source type to source values from nullable (Boolean) (defaults to: true) — whether the field is allowed to be set to null. When set to false, events that contain a null value in the from field will be rejected instead of setting the field’s value to null. can_change_from_null (Boolean) (defaults to: false) — whether a one-time mutation of the field value is allowed from null to a non-null value. This can be useful when dealing with a field that may not have a value on all source events. For example, if the source field was not initially part of the schema of your source dataset, you may have old records that lack a value for this field. When set, this option allows a one-time mutation of the field value from null to a non-null value. Once set to a non-null value, any additional null values that are encountered will be ignored (ensuring that the indexed data converges on the same state regardless of the order the events are ingested in). Note: this option cannot be enabled when nullable: false has been set. (DerivedFields::ImmutableValue) #max_value(field_name, from:) ⇒ DerivedIndexedType::MinOrMaxValue Configures field_name (on the derived indexing type) to contain the maximum of all values from the from field on the source type. Examples: ElasticGraph.define_schema do |schema| schema.object_type \"StudentCourseEnrollment\" do |t| t.field \"id\", \"ID\" t.field \"courseId\", \"ID\" t.field \"courseStartDate\", \"Date\" t.index \"student_course_enrollments\" t.derive_indexed_type_fields \"Course\", from_id: \"courseId\" do |derive| derive.max_value \"mostRecentlyOfferedDate\", from: \"courseStartDate\" end end schema.object_type \"Course\" do |t| t.field \"id\", \"ID\" t.field \"mostRecentlyOfferedDate\", \"Date\" t.index \"courses\" end end Parameters: field_name (String) — name of field on the derived indexing type to store the derived value from (String) — path to field on the source type to source values from (DerivedIndexedType::MinOrMaxValue) #min_value(field_name, from:) ⇒ DerivedIndexedType::MinOrMaxValue Configures field_name (on the derived indexing type) to contain the minimum of all values from the from field on the source type. Examples: ElasticGraph.define_schema do |schema| schema.object_type \"StudentCourseEnrollment\" do |t| t.field \"id\", \"ID\" t.field \"courseId\", \"ID\" t.field \"courseStartDate\", \"Date\" t.index \"student_course_enrollments\" t.derive_indexed_type_fields \"Course\", from_id: \"courseId\" do |derive| derive.min_value \"firstOfferedDate\", fro ed to the GraphQL query. Examples: Sort on name (ascending) with createdAt (descending) as a tie-breaker ElasticGraph.define_schema do |schema| schema.object_type \"Campaign\" do |t| t.field \"id\", \"ID!\" t.field \"name\", \"String\" t.field \"createdAt\", \"DateTime\" t.index \"campaigns\"do |i| i.default_sort \"name\", :asc, \"createdAt\", :desc end end end Parameters: field_name_direction_pairs (Array<(String, Symbol)>) — pairs of field names and :asc or :desc #rollover(frequency, timestamp_field_path_name) ⇒ void Note: the timestamp field specified here must be immutable. To understand why, consider a :yearly rollover index used for data based on createdAt; if ElasticGraph ingests record 123 with a createdAt of 2023-12-31T23:59:59Z, it will be indexed in the 2023 index. Later if it receives an update event for record 123 with a createdAt of 2024-01-01T00:00:00Z (a mere one second later!), ElasticGraph will store the new version of the payment in the 2024 index, and leave the old copy of the payment in the 2023 index unchanged. It’ll have duplicates for that document. Note: changing the rollover configuration on an existing index that already has data will result in duplicate documents This method returns an undefined value.Causes this index to “rollover” at the provided frequency based on the value of the provided timestamp_field_path_name. This is particularly useful for time-series data. Partitioning the data into hourly, daily, monthly or yearly buckets allows for different index configurations, and can be necessary when a dataset is too large to fit in one dataset given Elasticsearch/OpenSearch limitations on the number of shards in one index. In addition, ElasticGraph optimizes queries which filter on the timestamp field to target the subset of the indices in which matching documents could reside. Examples: Define a campaigns index to rollover yearly based on createdAt ElasticGraph.define_schema do |schema| schema.object_type \"Campaign\" do |t| t.field \ he definitions of the derived fields. Examples: Derive a Course type from StudentCourseEnrollment events ElasticGraph.define_schema do |schema| # `StudentCourseEnrollment` is a directly indexed type. schema.object_type \"StudentCourseEnrollment\" do |t| t.field \"id\", \"ID\" t.field \"courseId\", \"ID\" t.field \"courseName\", \"String\" t.field \"studentName\", \"String\" t.field \"courseStartDate\", \"Date\" t.index \"student_course_enrollments\" # Here we define how the `Course` indexed type is derived when we index `StudentCourseEnrollment` events. t.derive_indexed_type_fields \"Course\", from_id: \"courseId\" do |derive| # `derive` is an instance of `DerivedIndexedType`. derive.immutable_value \"name\", from: \"courseName\" derive.append_only_set \"students\", from: \"studentName\" derive.min_value \"firstOfferedDate\", from: \"courseStartDate\" derive.max_value \"mostRecentlyOfferedDate\", from: \"courseStartDate\" end end # `Course` is an indexed type that is derived entirely from `StudentCourseEnrollment` events. schema.object_type \"Course\" do |t| t.field \"id\", \"ID\" t.field \"name\", \"String\" t.field \"students\", \"[String!]!\" t.field \"firstOfferedDate\", \"Date\" t.field \"mostRecentlyOfferedDate\", \"Date\" t.index \"courses\" end end Parameters: name (String) — name of the derived type from_id (String) — path to the source type field with id values for the derived type route_with (String, nil) (defaults to: nil) — path to the source type field with values for shard routing on the derived type rollover_with (String, nil) (defaults to: nil) — path to the source type field with values for index rollover on the derived type Yields: (Indexing::DerivedIndexedType) — configuration object for field derivations #derived_indexed_types ⇒ Array<Indexing::DerivedIndexedType> Returns list of derived types for this source type. (Array<Indexing::DerivedIndexedType>) — list of derived types for this source type #index(name, **settings) {|Indexing::Index| ... } ⇒ void Note: Use #root_query_fields on indexed types to name the field that will be exposed on Query. Note: Indexed types must also define an id field, which ElasticGraph will use as the primary key. Note: Datastore index settings can also be defined (or overridden) in an environment-specific settings YAML file. Index settings that you want to configure differently for different environments (such as index.number_of_shards—-production and staging will probably need different numbers!) should be configured in the per-environment YAML configuration files rather than here. This method returns an undefined value.Converts the current type from being an embedded type (that is, a type that is embedded within another indexed type) to an indexed type that resides in the named index definition. Indexed types are directly indexed into the datastore, and will be queryable from the root Query type. Examples: Define a campaigns index ElasticGraph.define_schema do |schema| schema.object_type \"Campaign\" do |t| t.field \"id\", \"ID\" t.index( \"campaigns\", # Configure `index.refresh_interval`. refresh_interval: \"1s\", # Use `index.search` to log warnings for any search query that take more than five seconds. search: {slowlog: {level: \"WARN\", threshold: {query: {warn: \"5s\"}}}} ) do |i| # The index can be customized further here. end end end Parameters: name (String) — name of the index. See the Elasticsearch docs for restrictions. settings (Hash<Symbol, Object>) — datastore index settings you want applied to every environment. See the Elasticsearch docs for a list of valid settings, but be sure to omit the index. prefix here. Yields: (Indexing::Index) — the index, so it can be customized further #indexed? ⇒ Boolean Returns true if this type has an index. (Boolean) — true if this type has an index #plural_root_query_field_name ⇒ String Returns the plural name of the entity; used for the root Query field that queries documents of this indexed type. (String) — the plural name of the entity; used for the root Query field that queries documents of this indexed type #root_query_fields(plural:, singular: nil) {|SchemaElements::Field| ... } ⇒ void This method returns an undefined value.Determines what the root Query fields will be to query this indexed type. In addition, this method accepts a block, which you can use to customize the root query field (such as adding a GraphQL directive to it). Examples: Set plural and singular names ElasticGraph.define_schema do |schema| schema.object_type \"Person\" do |t| t.field \"id\", \"ID\" # Results in `Query.people` and `Query.personAggregations`. t.root_query_fields plural: \"people\", singular: \"person\" t.index \"people\" end end Customize Query fields ElasticGraph.define_schema do |schema| schema.object_type \"Person\" do |t| t.field \"id\", \"ID\" t.root_query_fields plural: \"people\", singular: \"person\" do |f| # Marks `Query.people` and `Query.personAggregations` as deprecated. f.directive \"deprecated\" end t.index \"people\" end end Parameters: plural (String) — the plural name of the entity; used for the root Query field that queries documents of this indexed type singular (String, nil) (defaults to: nil) — the singular name of the entity; used for the root Query field (with an Aggregations suffix) that queries aggregations of this indexed type. If not provided, will derive it from the type name (e.g. converting it to camelCase or snake_case, depending on configuration). Yields: (SchemaElements::Field) — field on the root Query type used to query this indexed type, to support customization #singular_root_query_field_name ⇒ String Returns the singular name of the entity; used for the root Query field (with an Aggregations suffix) that queries aggregations of this indexed type. If not provided, will derive it from the type name (e.g. converting it to camelCase or snake_case, depending on configuration). (String) — the singular name of the entity; used for the root Query field (with an Aggregations suffix) that queries aggregations of this indexed type. If not provided, will derive it from the type name (e.g. converting it to camelCase or snake_case, depending on configuration). This method returns an undefined value.Configures the ElasticGraph indexer to derive another type from this indexed type, using the from_id field as the source of the id of the derived type, and the provided block for the definitions of the derived fields. Returns list of derived types for this source type. Note: Use #root_query_fields on indexed types to name the field that will be exposed on Query. Note: Indexed types must also define an id field, which ElasticGraph will use as the primary key. Note: Datastore index settings can also be defined (or overridden) in an environment-specific settings YAML file. Index settings that you want to configure differently for different environments (such as index.number_of_shards—-production and staging will probably need different numbers!) should be configured in the per-environment YAML configuration files rather than here. This method returns an undefined value.Converts the current type from being an embedded type (that is, a type that is embedded within another indexed type) to an indexed type that resides in the named index definition. Indexed types are directly indexed into the datastore, and will be queryable from the root Query type. Returns true if this type has an index. Returns the plural name of the entity; used for the root Query field that queries documents of this indexed type. This method returns an undefined value.Determines what the root Query fields will be to query this indexed type. In addition, this method accepts a block, which you can use to customize the root query field (such as adding a GraphQL directive to it). Returns the singular name of the entity; used for the root Query field (with an Aggregations suffix) that queries aggregations of this indexed type. If not provided, will derive it from the type name (e.g. converting it to camelCase or snake_case, depending on configuration).",

    window.store["/docs/v0.19.1.1/ElasticGraph/SchemaDefinition/Mixins/HasTypeInfo.html"] = {
        "title": "API Documentation - Module: ElasticGraph::SchemaDefinition::Mixins::HasTypeInfo",
        "content": "Index (H) » ElasticGraph » SchemaDefinition » Mixins » HasTypeInfo Module: ElasticGraph::SchemaDefinition::Mixins::HasTypeInfo Included in: SchemaElements::Field, SchemaElements::ScalarType, SchemaElements::TypeWithSubfields elasticgraph-schema_definition/lib/elastic_graph/schema_definition/mixins/has_type_info.rb Mixin used to specify non-GraphQL type info (datastore index and JSON schema type info). Exists as a mixin so we can apply the same consistent API to every place we need to use this. Currently it’s used in 3 places: SchemaElements::ScalarType: allows specification of how scalars are represented in JSON schema and the index. SchemaElements::TypeWithSubfields: allows customization of how an object type is represented in JSON schema and the index. SchemaElements::Field: allows customization of a specific field over the field type’s standard JSON schema and the index mapping. Constant Summary collapse CUSTOMIZABLE_DATASTORE_PARAMS = Set of mapping parameters that it makes sense to allow customization of, based on the Elasticsearch docs. Set[ :analyzer, :eager_global_ordinals, :enabled, :fields, :format, :index, :meta, # not actually in the doc above. Added to support some `index_configurator` tests on 7.9+. :norms, :null_value, :search_analyzer, :type, ] Instance Method Summary collapse #json_schema(**options) ⇒ void Defines the JSON schema validations for this field or type. #json_schema_options ⇒ Hash<Symbol, Object> JSON schema options. #mapping(**options) ⇒ void Defines the Elasticsearch/OpenSearch field mapping type and mapping parameters for a field or type. #mapping_options ⇒ Hash<Symbol, Object> Datastore mapping options. Instance Method Details #json_schema(**options) ⇒ void Note: We recommend using JSON schema validations in a limited fashion. Validations that are appropriate to apply when data is entering the system-of-record are often not appropriate on a secondary index like ElasticGraph. Events that violate a JSON schema validation will fail to index (typically they will be sent to the dead letter queue and page an oncall engineer). If an ElasticGraph instance is meant to contain all the data of some source system, you probably don’t want it applying stricter validations than the source system itself has. We recommend limiting your JSON schema validations to situations where violations would prevent ElasticGraph from operating correctly. This method returns an undefined value.Defines the JSON schema validations for this field or type. Validations defined here will be included in the generated json_schemas.yaml artifact, which is used by the ElasticGraph indexer to validate events before indexing their data in the datastore. In addition, the publisher may use json_schemas.yaml for code generation and to apply validation before publishing an event to ElasticGraph. Can be called multiple times; each time, the options will be merged into the existing options. This is required on a SchemaElements::ScalarType (since we don’t know how a custom scalar type should be represented in JSON!). On a SchemaElements::Field, this is optional, but can be used to make the JSON schema validation stricter then it would otherwise be. For example, you could use json_schema maxLength: 30 on a String field to limit the length. You can use any of the JSON schema validation keywords here. In addition, nullable: false is supported to configure the generated JSON schema to disallow null values for the field. Note that if you define a field with a non-nullable GraphQL type (e.g. Int!), the JSON schema will automatically disallow nulls. However, as explained in the SchemaElements::TypeWithSubfields#field documentation, we generally recommend against defining non-nullable GraphQL fields. json_schema nullable: false will disallow null values from being indexed, while still keeping the field nullable in the GraphQL schema. If you think you might want to make a field non-nullable in the GraphQL schema some day, it’s a good idea to use json_schema nullable: false now to ensure every indexed record has a non-null value for the field. Examples: Define the JSON schema validations of a custom scalar type ElasticGraph.define_schema do |schema| schema.scalar_type \"URL\" do |t| t.mapping type: \"keyword\" # JSON schema has a built-in URI format validator: # https://json-schema.org/understanding-json-schema/reference/string.html#resource-identifiers t.json_schema type: \"string\", format: \"uri\" end end Define additional validations on a field ElasticGraph.define_schema do |schema| schema.object_type \"Card\" do |t| t.field \"id\", \"ID!\" t.field \"expYear\", \"Int\" do |f| # Use JSON schema to ensure the publisher is sending us 4 digit years, not 2 digit years. f.json_schema minimum: 2000, maximum: 2099 end t.field \"expMonth\", \"Int\" do |f| f.json_schema minimum: 1, maximum: 12 end t.index \"cards\" end end Parameters: options (Hash<Symbol, Object>) — JSON schema options #json_schema_options ⇒ Hash<Symbol, Object> Returns JSON schema options. (Hash<Symbol, Object>) — JSON schema options #mapping(**options) ⇒ void This method returns an undefined value.Defines the Elasticsearch/OpenSearch field mapping type and mapping parameters for a field or type. The options passed here will be included in the generated datastore_config.yaml artifact that ElasticGraph uses to configure Elasticsearch/OpenSearch. Can be called multiple times; each time, the options will be merged into the existing options. This is required on a SchemaElements::ScalarType; without it, ElasticGraph would have no way to know how the datatype should be indexed in the datastore. On a SchemaElements::Field, this can be used to customize how a field is indexed. For example, String fields are normally indexed as keywords; to instead index a String field for full text search, you’d need to configure mapping type: \"text\". On a SchemaElements::ObjectType, this can be used to use a specific Elasticsearch/OpenSearch data type for something that is modeled as an object in GraphQL. For example, we use it for the GeoLocation type so they get indexed in Elasticsearch using the geo_point type. Examples: Define the mapping of a custom scalar type ElasticGraph.define_schema do |schema| schema.scalar_type \"URL\" do |t| t.mapping type: \"keyword\" t.json_schema type: \"string\", format: \"uri\" end end Customize the mapping of a field ElasticGraph.define_schema do |schema| schema.object_type \"Card\" do |t| t.field \"id\", \"ID!\" t.field \"cardholderName\", \"String\" do |f| # index this field for full text search f.mapping type: \"text\" end t.field \"expYear\", \"Int\" do |f| # Use a smaller numeric type to save space in the datastore f.mapping type: \"short\" f.json_schema minimum: 2000, maximum: 2099 end t.field \"expMonth\", \"Int\" do |f| # Use a smaller numeric type to save space in the datastore f.mapping type: \"byte\" f.json_schema minimum: 1, maximum: 12 end t.index \"cards\" end end Parameters: options (Hash<Symbol, Object>) — mapping options–must be limited to CUSTOMIZABLE_DATASTORE_PARAMS #mapping_options ⇒ Hash<Symbol, Object> Returns datastore mapping options. (Hash<Symbol, Object>) — datastore mapping options Note: We recommend using JSON schema validations in a limited fashion. Validations that are appropriate to apply when data is entering the system-of-record are often not appropriate on a secondary index like ElasticGraph. Events that violate a JSON schema validation will fail to index (typically they will be sent to the dead letter queue and page an oncall engineer). If an ElasticGraph instance is meant to contain all the data of some source system, you probably don’t want it applying stricter validations than the source system itself has. We recommend limiting your JSON schema validations to situations where violations would prevent ElasticGraph from operating correctly. This method returns an undefined value.Defines the JSON schema validations for this field or type. Validations defined here will be included in the generated json_schemas.yaml artifact, which is used by the ElasticGraph indexer to validate events before indexing their data in the datastore. In addition, the publisher may use json_schemas.yaml for code generation and to apply validation before publishing an event to ElasticGraph. Can be called multiple times; each time, the options will be merged into the existing options. This is required on a SchemaElements::ScalarType (since we don’t know how a custom scalar type should be represented in JSON!). On a SchemaElements::Field, this is optional, but can be used to make the JSON schema validation stricter then it would otherwise be. For example, you could use json_schema maxLength: 30 on a String field to limit the length. You can use any of the JSON schema validation keywords here. In addition, nullable: false is supported to configure the generated JSON schema to disallow null values for the field. Note that if you define a field with a non-nullable GraphQL type (e.g. Int!), the JSON schema will automatically disallow nulls. However, as explained in the SchemaElements::TypeWithSubfields#field documentation, we generally recommend against defining non-nullable GraphQL fields. json_schema nullable: false will disallow null values from being indexed, while still keeping the field nullable in the GraphQL schema. If you think you might want to make a field non-nullable in the GraphQL schema some day, it’s a good idea to use json_schema nullable: false now to ensure every indexed record has a non-null value for the field. Returns JSON schema options. This method returns an undefined value.Defines the Elasticsearch/OpenSearch field mapping type and mapping parameters for a field or type. The options passed here will be included in the generated datastore_config.yaml artifact that ElasticGraph uses to configure Elasticsearch/OpenSearch. Can be called multiple times; each time, the options will be merged into the existing options. This is required on a SchemaElements::ScalarType; without it, ElasticGraph would have no way to know how the datatype should be indexed in the datastore. On a SchemaElements::Field, this can be used to customize how a field is indexed. For example, String fields are normally indexed as keywords; to instead index a String field for full text search, you’d need to configure mapping type: \"text\". On a SchemaElements::ObjectType, this can be used to use a specific Elasticsearch/OpenSearch data type for something that is modeled as an object in GraphQL. For example, we use it for the GeoLocation type so they get indexed in Elasticsearch using the geo_point type. Returns datastore mapping options.",

        "title": "API Documentation - Module: ElasticGraph::SchemaDefinition::Mixins::ImplementsInterfaces",
        "content": "Index (I) » ElasticGraph » SchemaDefinition » Mixins » ImplementsInterfaces Module: ElasticGraph::SchemaDefinition::Mixins::ImplementsInterfaces Included in: SchemaElements::InterfaceType, SchemaElements::ObjectType elasticgraph-schema_definition/lib/elastic_graph/schema_definition/mixins/implements_interfaces.rb Mixin for types that can implement interfaces (SchemaElements::ObjectType and SchemaElements::InterfaceType). Instance Method Summary collapse #implemented_interfaces ⇒ Array<SchemaElements::TypeReference> List of type references for the interface types implemented by this type. #implements(*interface_names) ⇒ void Declares that the current type implements the specified interface, making the current type a subtype of the interface. #to_sdl {|SchemaElements::Argument| ... } ⇒ String SDL string of the type. Instance Method Details #implemented_interfaces ⇒ Array<SchemaElements::TypeReference> Returns list of type references for the interface types implemented by this type. (Array<SchemaElements::TypeReference>) — list of type references for the interface types implemented by this type #implements(*interface_names) ⇒ void This method returns an undefined value.Declares that the current type implements the specified interface, making the current type a subtype of the interface. The current type must define all of the fields of the named interface, with the exact same field types. Examples: Implement an interface ElasticGraph.define_schema do |schema| schema.interface_type \"Athlete\" do |t| t.field \"name\", \"String\" t.field \"team\", \"String\" end schema.object_type \"BaseballPlayer\" do |t| t.implements \"Athlete\" t.field \"name\", \"String\" t.field \"team\", \"String\" t.field \"battingAvg\", \"Float\" end schema.object_type \"BasketballPlayer\" do |t| t.implements \"Athlete\" t.field \"name\", \"String\" t.field \"team\", \"String\" t.field \"pointsPerGame\", \"Float\" end end Parameters: interface_names (Array<String>) — names of interface types implemented by this type #to_sdl {|SchemaElements::Argument| ... } ⇒ String Returns SDL string of the type. Yields: (SchemaElements::Argument) — an argument Yield (Boolean) — whether or not to include the argument in the generated GraphQL SDL (String) — SDL string of the type Returns list of type references for the interface types implemented by this type. This method returns an undefined value.Declares that the current type implements the specified interface, making the current type a subtype of the interface. The current type must define all of the fields of the named interface, with the exact same field types. Returns SDL string of the type.",

    window.store["/docs/v0.19.1.1/ElasticGraph/SchemaDefinition/RakeTasks.html"] = {

        "content": "Index (R) » ElasticGraph » SchemaDefinition » RakeTasks Class: ElasticGraph::SchemaDefinition::RakeTasks Inherits: Rake::TaskLib Object Rake::TaskLib ElasticGraph::SchemaDefinition::RakeTasks show all elasticgraph-schema_definition/lib/elastic_graph/schema_definition/rake_tasks.rb Note: Local::RakeTasks wraps this and provides additional functionality. Most users will not need to interact with this class directly. Defines rake tasks for managing artifacts generated from a schema definition. Instance Method Summary collapse #initialize(index_document_sizes:, path_to_schema:, schema_artifacts_directory:, schema_element_name_form:, schema_element_name_overrides: {}, derived_type_name_formats: {}, type_name_overrides: {}, enum_value_overrides_by_type: {}, extension_modules: [], enforce_json_schema_version: true, output: $stdout) ⇒ RakeTasks constructor A new instance of RakeTasks. Constructor Details #initialize(index_document_sizes:, path_to_schema:, schema_artifacts_directory:, schema_element_name_form:, schema_element_name_overrides: {}, derived_type_name_formats: {}, type_name_overrides: {}, enum_value_overrides_by_type: {}, extension_modules: [], enforce_json_schema_version: true, output: $stdout) ⇒ RakeTasks Returns a new instance of RakeTasks. Examples: Minimal setup with defaults ElasticGraph::SchemaDefinition::RakeTasks.new( index_document_sizes: false, path_to_schema: \"config/schema.rb\", schema_artifacts_directory: \"config/schema/artifacts\", schema_element_name_form: :camelCase ) Spell out the full names of the gt/gte/lt/lte filter operators ElasticGraph::SchemaDefinition::RakeTasks.new( index_document_sizes: false, path_to_schema: \"config/schema.rb\", schema_artifacts_directory: \"config/schema/artifacts\", schema_element_name_form: :camelCase, schema_element_name_overrides: { gt: \"greaterThan\", gte: \"greaterThanOrEqualTo\", lt: \"lessThan\", lte: \"lessThanOrEqualTo\" } ) Change the AggregatedValues type suffix to Metrics ElasticGraph::SchemaDefinition::RakeTasks.new( index_document_sizes: false, path_to_schema: \"config/schema.rb\", schema_artifacts_directory: \"config/schema/artifacts\", schema_element_name_form: :camelCase, derived_type_name_formats: {AggregatedValues: \"Metrics\"} ) Rename JsonSafeLong to BigInt ElasticGraph::SchemaDefinition::RakeTasks.new( index_document_sizes: false, path_to_schema: \"config/schema.rb\", schema_artifacts_directory: \"config/schema/artifacts\", schema_element_name_form: :camelCase, type_name_overrides: {JsonSafeLong: \"BigInt\"} ) Shorten the names of the DayOfWeek enum values ElasticGraph::SchemaDefinition::RakeTasks.new( index_document_sizes: false, path_to_schema: \"config/schema.rb\", schema_artifacts_directory: \"config/schema/artifacts\", schema_element_name_form: :camelCase, enum_value_overrides_by_type: { DayOfWeek: { MONDAY: \"MON\", TUESDAY: \"TUE\", WEDNESDAY: \"WED\", THURSDAY: \"THU\", FRIDAY: \"FRI\", SATURDAY: \"SAT\", SUNDAY: \"SUN\" } } ) Parameters: index_document_sizes (Boolean) — When enabled, ElasticGraph will configure the index mappings so that the datastore indexes a _size field in each document. ElasticGraph itself does not do anything with this field, but it will be available for your use in any direct queries (e.g. via Kibana). Important note: this requires the mapper-size plugin to be installed on your datastore cluster. You are responsible for ensuring that is installed if you enable this feature. If you enable this and the plugin is not installed, you will get errors! path_to_schema (String, Pathname) — path to the main (or only) schema definition file schema_artifacts_directory (String, Pathname) — Directory to dump the schema artifacts in schema_element_name_form (:camelCase, :snake_case) — the form of names for schema elements (fields, arguments, directives) generated by ElasticGraph. schema_element_name_overrides (Hash<Symbol, String>) (defaults to: {}) — overrides for specific names of schema elements (fields, arguments, directives) generated by ElasticGraph. For example, to rename the gt filter field to greaterThan, pass {gt: \"greaterThan\"}. derived_type_name_formats (Hash<Symbol, String>) (defaults to: {}) — overrides for the naming formats used by ElasticGraph for derived GraphQL type names. For example, to use Metrics instead of AggregatedValues as the suffix for the generated types supporting getting aggregated metrid values, pass {AggregatedValues: \"%{base}Metrics\"}. See SchemaElements::TypeNamer::DEFAULT_FORMATS for the available formats. type_name_overrides (Hash<Symbol, String>) (defaults to: {}) — overrides for the names of specific GraphQL types. For example, to rename the DateTime scalar to Timestamp, pass {DateTime: \"Timestamp}. enum_value_overrides_by_type (Hash<Symbol, Hash<Symbol, String>>) (defaults to: {}) — overrides for the names of specific enum values for specific enum types. For example, to rename the DayOfWeek.MONDAY enum to DayOfWeek.MON, pass {DayOfWeek: {MONDAY: \"MON\"}}. extension_modules (Array<Module>) (defaults to: []) — List of Ruby modules to extend onto the SchemaDefinition::API instance. Designed to support ElasticGraph extension gems (such as elasticgraph-apollo). enforce_json_schema_version (Boolean) (defaults to: true) — Whether or not to enforce the requirement that the JSON schema version is incremented every time dumping the JSON schemas results in a changed artifact. Generally speaking, you will want this to be true for any ElasticGraph application that is in production as the versioning of JSON schemas is what supports safe schema evolution as it allows ElasticGraph to identify which version of the JSON schema the publishing system was operating on when it published an event. It can be useful to set it to false before your application is in production, as you do not want to be forced to bump the version after every single schema change while you are building an initial prototype. output (IO) (defaults to: $stdout) — used for printing task output Returns a new instance of RakeTasks.",
